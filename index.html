<!DOCTYPE html>
<!-- saved from url=(0017)https://lbyz.app/ -->
<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <!-- 允许垂直滚动但禁止双击放大、捏合缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>两步验证</title>
  <style>
    /* ====== Liquid Glass Design System ====== */
    :root {
      --bg: #eef3ff;
      --ink: #101624;
      --ink-soft: rgba(16, 22, 36, 0.74);
      --ink-dim: rgba(16, 22, 36, 0.52);
      --ink-mute: rgba(16, 22, 36, 0.36);

      --blue: #42a5ff;
      --purple: #8f5cff;
      --orange: #ff9b42;
      --green: #21a67a;
      --warn: #e88920;
      --crit: #e04452;

      --glass: rgba(255, 255, 255, 0.42);
      --glass-strong: rgba(255, 255, 255, 0.62);
      --glass-soft: rgba(255, 255, 255, 0.26);
      --glass-line: rgba(255, 255, 255, 0.72);
      --glass-shadow: rgba(38, 53, 86, 0.18);

      --mx: 0px;
      --my: 0px;
      --rx: 0deg;
      --ry: 0deg;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--bg);
    }

    body {
      min-height: 100dvh;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro SC",
        "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "微软雅黑", sans-serif;
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-x: none;
      touch-action: pan-y;
      position: relative;
      background:
        linear-gradient(135deg, #f8fbff 0%, #eef4ff 42%, #fff4ea 100%);
    }

    /* ====== 液态彩色光斑层：蓝 / 紫 / 橙，跟随鼠标轻微视差 ====== */
    .liquid-bg {
      position: fixed;
      inset: -12%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      filter: saturate(1.18);
    }

    .orb {
      position: absolute;
      width: var(--size);
      height: var(--size);
      left: var(--x);
      top: var(--y);
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.84), var(--color) 35%, transparent 70%);
      opacity: .78;
      filter: blur(34px);
      transform: translate3d(calc(var(--mx) * var(--depth)), calc(var(--my) * var(--depth)), 0) scale(1);
      animation: floatOrb var(--speed) ease-in-out infinite alternate;
      mix-blend-mode: multiply;
    }

    .orb-blue { --size: 46vmax; --x: -12%; --y: 2%; --color: rgba(66, 165, 255, .60); --depth: .34; --speed: 12s; }
    .orb-purple { --size: 40vmax; --x: 48%; --y: 7%; --color: rgba(143, 92, 255, .52); --depth: -.22; --speed: 15s; }
    .orb-orange { --size: 38vmax; --x: 58%; --y: 58%; --color: rgba(255, 155, 66, .54); --depth: .26; --speed: 14s; }

    @keyframes floatOrb {
      from { translate: -2% 1%; }
      to { translate: 3% -3%; }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.06)),
        radial-gradient(rgba(255,255,255,.45) 1px, transparent 1px);
      background-size: auto, 24px 24px;
      mask-image: radial-gradient(circle at center, black 20%, transparent 82%);
      -webkit-mask-image: radial-gradient(circle at center, black 20%, transparent 82%);
    }

    /* ====== 顶部液态玻璃条 ====== */
    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      z-index: 100;
      width: min(calc(100% - 32px), 680px);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 11px 18px;
      color: rgba(16, 22, 36, 0.78);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.25px;
      border: 1px solid var(--glass-line);
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.70), rgba(255,255,255,.28)),
        radial-gradient(circle at 20% 0%, rgba(66,165,255,.30), transparent 35%),
        radial-gradient(circle at 75% 100%, rgba(255,155,66,.24), transparent 40%);
      backdrop-filter: blur(26px) saturate(190%);
      -webkit-backdrop-filter: blur(26px) saturate(190%);
      box-shadow: 0 18px 46px -30px var(--glass-shadow), inset 0 1px rgba(255,255,255,.78);
    }

    .topbar svg { width: 14px; height: 14px; stroke-width: 2.2; color: var(--purple); }

    /* ====== 12 栏响应式舞台 ====== */
    .stage {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      min-height: 100vh;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 92px clamp(16px, 4vw, 34px) 34px;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      align-items: center;
      gap: 22px;
      perspective: 1200px;
    }

    /* ====== 主卡片：真实 liquid glass，透出背景色 ====== */
    .glass-card {
      grid-column: 4 / span 6;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: clamp(20px, 3vw, 34px);
      display: grid;
      gap: 18px;
      border-radius: 34px;
      border: 1px solid var(--glass-line);
      background:
        linear-gradient(145deg, rgba(255,255,255,.66), rgba(255,255,255,.24)),
        radial-gradient(circle at calc(35% + var(--mx) * .08) calc(0% + var(--my) * .08), rgba(66,165,255,.26), transparent 38%),
        radial-gradient(circle at calc(85% - var(--mx) * .06) calc(100% - var(--my) * .06), rgba(255,155,66,.24), transparent 34%),
        radial-gradient(circle at 72% 18%, rgba(143,92,255,.19), transparent 32%);
      backdrop-filter: blur(34px) saturate(210%);
      -webkit-backdrop-filter: blur(34px) saturate(210%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.90),
        inset 0 -1px 0 rgba(255,255,255,.22),
        0 28px 80px -38px rgba(38, 53, 86, .52),
        0 8px 26px -18px rgba(38, 53, 86, .30);
      transform: rotateX(var(--rx)) rotateY(var(--ry));
      animation: fadeUp .75s cubic-bezier(.2,.8,.2,1) both;
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(115deg, rgba(255,255,255,.62), transparent 28%, rgba(255,255,255,.16) 56%, transparent 78%);
      opacity: .82;
    }

    .glass-card > * { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; }

    .brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 760; letter-spacing: -0.35px; }

    .brand-mark {
      width: 36px; height: 36px; border-radius: 13px;
      display: grid; place-items: center;
      color: white; font-size: 13px; font-weight: 800;
      background: linear-gradient(135deg, var(--blue), var(--purple) 54%, var(--orange));
      box-shadow: inset 0 1px rgba(255,255,255,.35), 0 12px 26px -16px var(--purple);
    }

    .clock, .secret-input, .feature {
      background:
        linear-gradient(145deg, rgba(255,255,255,.64), rgba(255,255,255,.26));
      border: 1px solid rgba(255,255,255,.58);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      box-shadow: inset 0 1px rgba(255,255,255,.70), 0 10px 24px -22px rgba(16,22,36,.5);
    }

    .clock { display: flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 999px; font-size: 12px; color: var(--ink-soft); }
    .clock-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(33,166,122,.14); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:.52; } 50% { opacity:1; } }
    .clock-time { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }

    .code-section { display: flex; flex-direction: column; align-items: center; padding: 6px 0 2px; }
    .code-label { font-size: 11px; letter-spacing: 2.4px; color: var(--ink-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 18px; }
    .code-stage { position: relative; width: clamp(196px, 34vw, 260px); height: clamp(196px, 34vw, 260px); display: grid; place-items: center; cursor: pointer; user-select: none; transition: transform .16s ease; border-radius: 50%; }
    .code-stage:hover { transform: scale(1.012); }
    .code-stage:active { transform: scale(.988); }
    .ring { position:absolute; inset:0; width:100%; height:100%; transform: rotate(-90deg); pointer-events:none; }
    .ring circle { fill:none; stroke-width:5; }
    .ring-track { stroke: rgba(16,22,36,.10); }
    .ring-progress { stroke:url(#gradNormal); stroke-linecap:round; transition: stroke-dashoffset .95s linear; filter: drop-shadow(0 8px 12px rgba(66,165,255,.22)); }
    .ring-progress.warn { stroke:url(#gradWarn); }
    .ring-progress.crit { stroke:url(#gradCrit); }
    .code-inner { width: 80%; text-align:center; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 850; font-size: clamp(38px, 6vw, 52px); letter-spacing: -1.8px; color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1; transition: opacity .25s ease; text-shadow: 0 1px rgba(255,255,255,.55); }
    .code.placeholder { color: var(--ink-mute); font-weight: 650; letter-spacing: 5px; }
    .code.flash { animation: codeFlash .5s ease; }
    @keyframes codeFlash { 0% { opacity:0; transform:translateY(5px); filter:blur(4px); } 100% { opacity:1; transform:translateY(0); filter:blur(0); } }
    .countdown { margin-top: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 15px; color: var(--ink-soft); font-variant-numeric: tabular-nums; font-weight: 760; transition: color .35s ease; }
    .countdown.warn { color: var(--warn); } .countdown.crit { color: var(--crit); }
    .copy-hint { margin-top: 14px; display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-dim); font-weight:650; transition:color .25s ease; }
    .copy-hint.success { color: var(--green); font-weight: 760; } .copy-hint svg { width:13px; height:13px; stroke-width:2; }
    .ripple { position:absolute; border-radius:50%; background: radial-gradient(circle, rgba(66,165,255,.55), rgba(143,92,255,.22)); opacity:.35; transform:translate(-50%,-50%) scale(0); pointer-events:none; animation:ripple .7s ease-out forwards; }
    @keyframes ripple { to { transform:translate(-50%,-50%) scale(8); opacity:0; } }

    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.80), rgba(143,92,255,.22), transparent); }

    .input-section { display:flex; flex-direction:column; gap:8px; }
    .input-header { display:flex; justify-content:space-between; align-items:center; font-size:11px; letter-spacing:1.4px; color:var(--ink-dim); font-weight:800; text-transform:uppercase; }
    .clear-btn { appearance:none; background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.45); color:var(--ink-dim); font-size:11px; cursor:pointer; padding:5px 9px; border-radius:999px; font-weight:700; transition: all .18s ease; font-family:inherit; letter-spacing:.5px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .clear-btn:hover, .clear-btn:active { color:var(--purple); background:rgba(255,255,255,.48); }
    .secret-input { width:100%; padding:14px 16px; border-radius:16px; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:16px; letter-spacing:.5px; color:var(--ink); outline:none; font-weight:600; text-align:center; transition:border-color .2s, box-shadow .2s, background .2s; }
    .secret-input::placeholder { color: var(--ink-mute); font-weight: 500; }
    .secret-input:focus { border-color: rgba(143,92,255,.58); background: rgba(255,255,255,.72); box-shadow: 0 0 0 4px rgba(143,92,255,.13), inset 0 1px rgba(255,255,255,.8); }
    .message { font-size: 12px; text-align:center; color:var(--crit); font-weight:600; min-height:15px; }
    .message.success { color: var(--green); } .message:empty { min-height: 0; }

    .features { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
    .feature { padding: 13px 8px; border-radius: 18px; text-align:center; transition: transform .18s, background .18s; }
    .feature:hover { transform: translateY(-2px); background: rgba(255,255,255,.42); }
    .feature:active { transform: scale(.98); }
    .feature-icon { width:24px; height:24px; margin:0 auto 6px; display:grid; place-items:center; color:var(--purple); }
    .feature-content { display: flex; flex-direction: column; align-items: center; }
    .feature-icon svg { width:18px; height:18px; stroke-width:1.9; }
    .feature-title { font-size: 12px; font-weight: 760; color: var(--ink); }
    .feature-desc { font-size: 10px; color: var(--ink-dim); margin-top: 2px; font-weight: 560; }

    /* ====== 响应式：12栏 -> 6+6 -> 单列；按钮自动撑满 ====== */
    @media (max-width: 1024px) {
      .stage { grid-template-columns: repeat(6, minmax(0, 1fr)); padding-top: 88px; }
      .glass-card { grid-column: 1 / -1; max-width: 560px; }
    }

    @media (max-width: 768px) {
      .topbar {
        width: min(calc(100% - 24px), 560px);
        top: max(10px, env(safe-area-inset-top));
        padding: 11px 16px;
      }

      .stage {
        grid-template-columns: 1fr;
        padding: 82px 16px 24px;
        align-items: start;
      }

      .glass-card {
        grid-column: 1;
        max-width: none;
        border-radius: 30px;
        padding: 24px;
        gap: 18px;
      }

      .card-header { align-items: center; }
      .brand { font-size: 22px; }
      .brand-mark { width: 44px; height: 44px; border-radius: 15px; font-size: 17px; }
      .clock { padding: 8px 13px; font-size: 13px; }

      .code-section { padding-top: 4px; }
      .code-label { margin-bottom: 16px; }
      .code-stage { width: min(62vw, 238px); height: min(62vw, 238px); }
      .code { font-size: clamp(38px, 10vw, 48px); }
      .countdown { margin-top: 8px; font-size: 16px; }
      .copy-hint { margin-top: 16px; }

      .input-section { gap: 10px; }
      .input-header {
        display: grid;
        grid-template-columns: auto minmax(112px, 1fr);
        align-items: center;
        gap: 12px;
        font-size: 12px;
        letter-spacing: 1.6px;
        padding: 0;
      }

      .clear-btn {
        width: 100%;
        height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 760;
        background:
          linear-gradient(145deg, rgba(255,255,255,.50), rgba(255,255,255,.22));
        border: 1px solid rgba(255,255,255,.55);
        box-shadow: inset 0 1px rgba(255,255,255,.72), 0 8px 18px -16px rgba(16,22,36,.45);
      }

      .secret-input {
        width: 100%;
        height: 58px;
        padding: 0 18px;
        border-radius: 20px;
        font-size: 17px;
        line-height: 58px;
        background:
          linear-gradient(145deg, rgba(255,255,255,.52), rgba(255,255,255,.22));
      }

      .secret-input::placeholder { font-size: 17px; opacity: .72; }

      .features {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .feature {
        width: 100%;
        min-height: 88px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 14px;
        text-align: left;
        padding: 18px;
        border-radius: 24px;
      }

      .feature-icon {
        flex: 0 0 42px;
        width: 42px;
        height: 42px;
        margin: 0;
        border-radius: 15px;
        background: rgba(255,255,255,.28);
        box-shadow: inset 0 1px rgba(255,255,255,.60);
      }

      .feature-icon svg { width: 22px; height: 22px; }
      .feature-content { align-items: flex-start; }
      .feature-title { font-size: 16px; line-height: 1.15; }
      .feature-desc { margin-top: 4px; font-size: 13px; }
    }

    @media (max-height: 700px) {
      .stage { padding-top: 70px; padding-bottom: 14px; }
      .glass-card { gap: 12px; padding: 18px; border-radius: 26px; }
      .topbar { padding: 9px 14px; font-size: 12px; }
      .code-label { margin-bottom: 10px; }
      .code-stage { width: clamp(164px, 42vh, 204px); height: clamp(164px, 42vh, 204px); }
      .copy-hint { margin-top: 8px; }
      .features { gap: 7px; }
      .feature { padding: 9px 7px; border-radius: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .orb, .glass-card, .clock-dot, .code.flash { animation: none !important; }
      .glass-card { transform: none !important; }
    }
</style>
</head>
<body>

  <div class="liquid-bg" aria-hidden="true">
    <span class="orb orb-blue"></span>
    <span class="orb orb-purple"></span>
    <span class="orb orb-orange"></span>
  </div>

  <!-- 顶部固定毛玻璃条 -->
  <div class="topbar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    <span>本地计算 · 安全无忧</span>
  </div>

  <!-- 主舞台 -->
  <main class="stage">

    <!-- 单一大毛玻璃卡片：包含所有内容 -->
    <div class="glass-card">

      <!-- 卡片顶部：logo / 时钟 -->
      <header class="card-header">
        <div class="brand">
          <div class="brand-mark">2F</div>
          <span>Auth</span>
        </div>
        <div class="clock">
          <span class="clock-dot"></span>
          <span class="clock-time" id="clockTime">14:47:20</span>
        </div>
      </header>

      <!-- 验证码圆环区 -->
      <section class="code-section">
        <div class="code-label">One-Time Code</div>

        <div class="code-stage" id="codeStage" role="button" tabindex="0" aria-label="点击复制验证码">
          <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
            <!-- 三套渐变 -->
            <defs>
              <linearGradient id="gradNormal" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#42a5ff"></stop>
                <stop offset="55%" stop-color="#8f5cff"></stop>
                <stop offset="100%" stop-color="#21a67a"></stop>
              </linearGradient>
              <linearGradient id="gradWarn" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8f5cff"></stop>
                <stop offset="100%" stop-color="#ff9b42"></stop>
              </linearGradient>
              <linearGradient id="gradCrit" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff9b42"></stop>
                <stop offset="100%" stop-color="#e04452"></stop>
              </linearGradient>
            </defs>
            <circle class="ring-track" cx="50" cy="50" r="46"></circle>
            <circle class="ring-progress warn" id="ringProgress" cx="50" cy="50" r="46" stroke-dasharray="289.03" stroke-dashoffset="0" style="stroke-dashoffset: 192.684;"></circle>
          </svg>

          <div class="code-inner">
            <div class="code placeholder" id="code">— — —</div>
            <div class="countdown warn" id="countdown">10 s</div>
          </div>
        </div>

        <div class="copy-hint" id="copyHint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span id="copyHintText">点击数字复制</span>
        </div>
      </section>

      <!-- 分隔线 -->
      <div class="divider"></div>

      <!-- 密钥输入区 -->
      <section class="input-section">
        <div class="input-header">
          <span>Secret Key</span>
          <button class="clear-btn" id="clearBtn" type="button">清空</button>
        </div>
        <input class="secret-input" id="secret" autocomplete="off" spellcheck="false" placeholder="在此处输入密钥">
        <div class="message" id="message"></div>
      </section>

      <!-- 三列特性 -->
      <section class="features">
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <div class="feature-content">
            <div class="feature-title">本地计算</div>
            <div class="feature-desc">密钥不上传</div>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="feature-content">
            <div class="feature-title">即时刷新</div>
            <div class="feature-desc">每 30 秒</div>
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </div>
          <div class="feature-content">
            <div class="feature-title">点击复制</div>
            <div class="feature-desc">一键到剪贴板</div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script>
    // ====== DOM 元素 ======
    const secretInput = document.getElementById("secret");
    const codeEl = document.getElementById("code");
    const messageEl = document.getElementById("message");
    const countdownEl = document.getElementById("countdown");
    const ringProgress = document.getElementById("ringProgress");
    const codeStage = document.getElementById("codeStage");
    const copyHint = document.getElementById("copyHint");
    const copyHintText = document.getElementById("copyHintText");
    const clearBtn = document.getElementById("clearBtn");
    const clockTimeEl = document.getElementById("clockTime");

    // ====== Liquid Glass 鼠标 / 触摸视差 ======
    const rootStyle = document.documentElement.style;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function setLiquidParallax(clientX, clientY) {
      if (reduceMotion) return;
      const x = (clientX / window.innerWidth - 0.5) * 2;
      const y = (clientY / window.innerHeight - 0.5) * 2;
      rootStyle.setProperty("--mx", `${x * 26}px`);
      rootStyle.setProperty("--my", `${y * 26}px`);
      rootStyle.setProperty("--rx", `${y * -3.2}deg`);
      rootStyle.setProperty("--ry", `${x * 3.2}deg`);
    }

    window.addEventListener("pointermove", (event) => {
      setLiquidParallax(event.clientX, event.clientY);
    }, { passive: true });

    window.addEventListener("pointerleave", () => {
      rootStyle.setProperty("--mx", "0px");
      rootStyle.setProperty("--my", "0px");
      rootStyle.setProperty("--rx", "0deg");
      rootStyle.setProperty("--ry", "0deg");
    });


    // ====== 常量 ======
    const PERIOD = 30;
    const DIGITS = 6;
    const RING_CIRCUMFERENCE = 2 * Math.PI * 46;
    let lastCounter = null;

    // ====== 从 URL hash 读密钥 ======
    function getSecretFromUrl() {
      const hashSecret = decodeURIComponent(location.hash.replace(/^#/, "").trim());
      return hashSecret || "";
    }

    // ====== 提取密钥（支持 otpauth://） ======
    function extractSecret(input) {
      let value = input.trim();
      if (value.toLowerCase().startsWith("otpauth://")) {
        try {
          const url = new URL(value);
          value = url.searchParams.get("secret") || "";
        } catch (_) {
          throw new Error("otpauth 链接格式不正确");
        }
      }
      return value.replace(/\s+/g, "").replace(/=+$/g, "").toUpperCase();
    }

    // ====== Base32 解码 ======
    function base32Decode(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      if (!base32) throw new Error("请输入密钥以生成验证码");

      for (const char of base32) {
        const value = alphabet.indexOf(char);
        if (value === -1) throw new Error("密钥仅支持 A-Z / 2-7 或 otpauth:// 链接");
        bits += value.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      view.setUint32(0, Math.floor(counter / 0x100000000), false);
      view.setUint32(4, counter >>> 0, false);
      return buffer;
    }

    // ====== TOTP 算法 ======
    async function generateTOTP(secret, digits = DIGITS, period = PERIOD) {
      const keyBytes = base32Decode(secret);
      const counter = Math.floor(Date.now() / 1000 / period);

      const cryptoKey = await crypto.subtle.importKey(
        "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
      );

      const hmac = new Uint8Array(
        await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter))
      );

      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** digits).padStart(digits, "0");
    }

    function formatCode(code) {
      return code.slice(0, 3) + " " + code.slice(3);
    }

    // ====== 更新圆环和颜色 ======
    function updateRing(remaining) {
      const ratio = remaining / PERIOD;
      ringProgress.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - ratio);

      ringProgress.classList.remove("warn", "crit");
      countdownEl.classList.remove("warn", "crit");
      if (remaining <= 5) {
        ringProgress.classList.add("crit");
        countdownEl.classList.add("crit");
      } else if (remaining <= 10) {
        ringProgress.classList.add("warn");
        countdownEl.classList.add("warn");
      }
    }

    function updateClock() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      clockTimeEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    // ====== 主刷新循环 ======
    async function updateCode(force = false) {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);

      countdownEl.textContent = String(remaining).padStart(2, "0") + " s";
      updateRing(remaining);
      updateClock();

      if (!force && counter === lastCounter) return;
      lastCounter = counter;

      const rawSecret = secretInput.value;
      if (!rawSecret.trim()) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = "";
        return;
      }

      try {
        if (!window.crypto || !crypto.subtle) {
          throw new Error("当前浏览器不支持 Web Crypto");
        }

        const secret = extractSecret(rawSecret);
        const code = await generateTOTP(secret);
        codeEl.textContent = formatCode(code);
        codeEl.classList.remove("placeholder");
        codeEl.classList.remove("flash");
        void codeEl.offsetWidth;
        codeEl.classList.add("flash");
        messageEl.textContent = "";
        messageEl.classList.remove("success");
      } catch (error) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = error.message || "生成失败";
        messageEl.classList.remove("success");
      }
    }

    secretInput.addEventListener("input", () => {
      lastCounter = null;
      updateCode(true);
    });

    // ====== 复制 ======
    async function copyCode(event) {
      const raw = codeEl.textContent.replace(/\s/g, "");
      if (!/^\d{6}$/.test(raw)) {
        messageEl.textContent = "请先输入有效密钥";
        messageEl.classList.remove("success");
        return;
      }

      if (event && event.clientX !== undefined) {
        const rect = codeStage.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = (event.clientX - rect.left) + "px";
        ripple.style.top = (event.clientY - rect.top) + "px";
        ripple.style.width = ripple.style.height = "20px";
        codeStage.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      }

      try {
        await navigator.clipboard.writeText(raw);
        copyHint.classList.add("success");
        copyHintText.textContent = "已复制 " + formatCode(raw);
        setTimeout(() => {
          copyHint.classList.remove("success");
          copyHintText.textContent = "点击数字复制";
        }, 1800);
      } catch (_) {
        messageEl.textContent = "复制失败，请手动选择";
        messageEl.classList.remove("success");
      }
    }

    codeStage.addEventListener("click", copyCode);
    codeStage.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); copyCode(); }
    });

    clearBtn.addEventListener("click", () => {
      secretInput.value = "";
      codeEl.textContent = "— — —";
      codeEl.classList.add("placeholder");
      messageEl.textContent = "";
      lastCounter = null;
      secretInput.focus();
    });

    const urlSecret = getSecretFromUrl();
    if (urlSecret) secretInput.value = urlSecret;

    updateClock();
    setInterval(() => updateCode(false), 250);
    updateCode(true);
  </script>


</body></html>
