<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 允许垂直滚动但禁止双击放大、捏合缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>两步验证</title>
  <style>
    /* ====== 设计令牌 ====== */
    :root {
      --green: #1f5f48;
      --green-bright: #2a8b66;
      --green-deep: #163f30;
      --warn: #d97a1f;
      --crit: #c0392b;

      --ink: #1a2620;
      --ink-soft: #3a4a42;
      --ink-dim: #6a7a72;
      --ink-mute: #9aa6a0;

      --glass: rgba(255, 255, 255, 0.55);
      --glass-strong: rgba(255, 255, 255, 0.75);
      --glass-soft: rgba(255, 255, 255, 0.35);
      --glass-line: rgba(255, 255, 255, 0.6);
      --glass-line-soft: rgba(255, 255, 255, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ====== 全局：禁止左右滑动，允许上下（兜底） ====== */
    html {
      height: 100%;
      overflow-x: hidden;        /* 禁止左右 */
      overflow-y: auto;          /* 允许上下 */
    }

    body {
      min-height: 100dvh;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro SC",
        "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "微软雅黑", sans-serif;
      color: var(--ink);
      overflow-x: hidden;        /* 禁止左右滑动 */
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-x: none; /* 禁止 iOS 边缘弹性左右滚 */
      touch-action: pan-y;       /* 只允许垂直方向触摸滑动 */
      background: #f0ede4;
      position: relative;
    }

    /* ====== 背景渐变光斑：让毛玻璃有色彩折射 ====== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 12% 18%, rgba(42, 139, 102, 0.45), transparent 60%),
        radial-gradient(ellipse 60% 50% at 88% 85%, rgba(217, 122, 31, 0.28), transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255, 220, 180, 0.45), transparent 70%),
        radial-gradient(ellipse 40% 30% at 90% 15%, rgba(192, 57, 43, 0.15), transparent 65%);
      pointer-events: none;
    }

    /* 背景纹理点 */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(rgba(0, 0, 0, 0.035) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      pointer-events: none;
    }

    /* ====== 顶部固定毛玻璃条 ====== */
    .topbar {
      position: fixed;            /* 固定 */
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      background: rgba(31, 95, 72, 0.55);
      color: rgba(255, 255, 255, 0.98);
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      box-shadow: 0 6px 20px rgba(22, 63, 48, 0.18);
    }

    .topbar svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.2;
    }

    /* ====== 主舞台：占满整屏，给顶部条留出空间 ====== */
    .stage {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      min-height: 100vh;
      padding: 56px 16px 16px;    /* 顶部 56px 留给固定 topbar */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ====== 大毛玻璃卡片：包裹所有内容 ====== */
    .glass-card {
      width: 100%;
      max-width: 440px;
      padding: 20px 22px 18px;
      background: var(--glass);
      border: 1px solid var(--glass-line);
      border-radius: 28px;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.7) inset,
        0 20px 50px -20px rgba(31, 95, 72, 0.28),
        0 4px 20px -4px rgba(60, 80, 70, 0.12);
      animation: fadeUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ====== 卡片内顶部：左 logo / 右时钟 ====== */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 600;
      font-size: 16px;
      color: var(--ink);
      letter-spacing: -0.2px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--green-bright) 0%, var(--green) 60%, var(--green-deep) 100%);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 11px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.25) inset,
        0 4px 10px -2px rgba(31, 95, 72, 0.5);
    }

    /* 时钟胶囊 */
    .clock {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 11px 5px 9px;
      background: var(--glass-strong);
      border: 1px solid var(--glass-line);
      border-radius: 999px;
      font-size: 12px;
      color: var(--ink-soft);
    }

    .clock-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2.5px rgba(31, 95, 72, 0.18);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    .clock-time {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 600;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
    }

    /* ====== 验证码圆环区 ====== */
    .code-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 0;
    }

    .code-label {
      font-size: 10.5px;
      letter-spacing: 1.8px;
      color: var(--ink-dim);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 14px;
    }

    /* 圆环 + 数字容器 */
    .code-stage {
      position: relative;
      width: clamp(180px, 56vw, 220px);
      height: clamp(180px, 56vw, 220px);
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.15s ease;
      border-radius: 50%;
    }

    .code-stage:active { transform: scale(0.985); }

    .ring {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      pointer-events: none;
    }

    .ring circle {
      fill: none;
      stroke-width: 5;
    }

    .ring-track { stroke: rgba(31, 95, 72, 0.14); }

    .ring-progress {
      stroke: url(#gradNormal);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.95s linear;
      filter: drop-shadow(0 2px 6px rgba(31, 95, 72, 0.3));
    }

    .ring-progress.warn { stroke: url(#gradWarn); }
    .ring-progress.crit { stroke: url(#gradCrit); }

    .code-inner {
      width: 78%;
      text-align: center;
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 700;
      font-size: clamp(34px, 9vw, 42px);
      letter-spacing: -1px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: opacity 0.25s ease;
    }

    .code.placeholder {
      color: var(--ink-mute);
      font-weight: 600;
      letter-spacing: 4px;
    }

    .code.flash { animation: codeFlash 0.5s ease; }

    @keyframes codeFlash {
      0%   { opacity: 0; transform: translateY(4px); filter: blur(3px); }
      100% { opacity: 1; transform: translateY(0);   filter: blur(0); }
    }

    .countdown {
      margin-top: 10px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 14px;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      transition: color 0.4s ease;
    }

    .countdown.warn { color: var(--warn); }
    .countdown.crit { color: var(--crit); }

    .copy-hint {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      color: var(--ink-dim);
      font-weight: 500;
      transition: color 0.25s ease;
    }

    .copy-hint.success { color: var(--green); font-weight: 600; }
    .copy-hint svg { width: 12px; height: 12px; stroke-width: 2; }

    /* 复制水波纹 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.2;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: ripple 0.7s ease-out forwards;
    }

    @keyframes ripple {
      to { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    /* ====== 渐变分隔线 ====== */
    .divider {
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(31, 95, 72, 0.2) 20%,
        rgba(31, 95, 72, 0.2) 80%,
        transparent);
    }

    /* ====== 输入区 ====== */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10.5px;
      letter-spacing: 1.2px;
      color: var(--ink-dim);
      font-weight: 600;
      text-transform: uppercase;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--ink-mute);
      font-size: 10.5px;
      cursor: pointer;
      padding: 0;
      font-weight: 500;
      transition: color 0.15s ease;
      font-family: inherit;
      letter-spacing: 0.5px;
    }

    .clear-btn:hover, .clear-btn:active { color: var(--green); }

    .secret-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--glass-strong);
      border: 1px solid var(--glass-line-soft);
      border-radius: 11px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 16px;            /* iOS 防缩放 */
      letter-spacing: 0.5px;
      color: var(--ink);
      outline: none;
      font-weight: 500;
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .secret-input::placeholder {
      color: var(--ink-mute);
      font-weight: 400;
    }

    .secret-input:focus {
      border-color: var(--green);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 3px rgba(31, 95, 72, 0.12);
    }

    .message {
      font-size: 11px;
      text-align: center;
      color: var(--crit);
      font-weight: 500;
      min-height: 13px;
    }

    .message.success { color: var(--green); }
    .message:empty { min-height: 0; }

    /* ====== 三列特性带 ====== */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .feature {
      padding: 10px 6px;
      background: var(--glass-soft);
      border: 1px solid var(--glass-line-soft);
      border-radius: 12px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s, transform 0.2s;
    }

    .feature:active { transform: scale(0.97); }

    .feature-icon {
      width: 20px;
      height: 20px;
      margin: 0 auto 4px;
      display: grid;
      place-items: center;
      color: var(--green);
    }

    .feature-icon svg { width: 16px; height: 16px; stroke-width: 1.8; }

    .feature-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink);
    }

    .feature-desc {
      font-size: 9.5px;
      color: var(--ink-dim);
      margin-top: 1px;
    }

    /* ====== 桌面端：放大圆环和字号 ====== */
    @media (min-width: 600px) {
      .stage { padding: 64px 24px 24px; }

      .glass-card {
        padding: 28px 32px 24px;
        gap: 18px;
      }

      .brand { font-size: 18px; }
      .brand-mark { width: 32px; height: 32px; font-size: 13px; }

      .clock { padding: 6px 13px 6px 10px; font-size: 13px; }
      .clock-dot { width: 7px; height: 7px; }

      .code-label { font-size: 12px; margin-bottom: 18px; }
      .code-stage { width: 240px; height: 240px; }
      .code { font-size: 46px; }
      .countdown { font-size: 16px; margin-top: 12px; }
      .copy-hint { font-size: 12.5px; margin-top: 14px; }
      .copy-hint svg { width: 13px; height: 13px; }

      .input-header { font-size: 11.5px; }
      .clear-btn { font-size: 11.5px; }
      .secret-input { padding: 13px 16px; }
      .message { font-size: 12px; }

      .feature { padding: 13px 8px; border-radius: 13px; }
      .feature-icon { width: 22px; height: 22px; margin-bottom: 5px; }
      .feature-icon svg { width: 18px; height: 18px; }
      .feature-title { font-size: 11.5px; }
      .feature-desc { font-size: 10px; }

      .spec { font-size: 10.5px; }
    }

    /* ====== 极小屏幕（高度 ≤ 680px）：进一步压缩 ====== */
    @media (max-height: 680px) {
      .topbar { padding: 9px 16px; font-size: 12.5px; }
      .stage { padding: 46px 14px 12px; }

      .glass-card {
        padding: 14px 18px 14px;
        gap: 10px;
        border-radius: 24px;
      }

      .brand { font-size: 14px; gap: 7px; }
      .brand-mark { width: 24px; height: 24px; font-size: 10px; border-radius: 7px; }

      .clock { padding: 4px 9px 4px 8px; font-size: 11px; gap: 6px; }
      .clock-time { font-size: 11px; }

      .code-label { font-size: 10px; margin-bottom: 8px; letter-spacing: 1.5px; }
      .code-stage { width: clamp(150px, 44vw, 180px); height: clamp(150px, 44vw, 180px); }
      .ring circle { stroke-width: 4; }
      .countdown { margin-top: 6px; font-size: 12.5px; }
      .copy-hint { margin-top: 6px; font-size: 11px; }

      .input-section { gap: 4px; }
      .secret-input { padding: 9px 12px; border-radius: 10px; }

      .features { gap: 5px; }
      .feature { padding: 7px 4px; border-radius: 9px; }
      .feature-icon { width: 16px; height: 16px; margin-bottom: 2px; }
      .feature-icon svg { width: 12px; height: 12px; }
      .feature-title { font-size: 10px; }
      .feature-desc { font-size: 8.5px; }

      .spec { font-size: 9px; padding-top: 2px; }
    }
  </style>
</head>
<body>

  <!-- 顶部固定毛玻璃条 -->
  <div class="topbar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <span>本地计算 · 安全无忧</span>
  </div>

  <!-- 主舞台 -->
  <main class="stage">

    <!-- 单一大毛玻璃卡片：包含所有内容 -->
    <div class="glass-card">

      <!-- 卡片顶部：logo / 时钟 -->
      <header class="card-header">
        <div class="brand">
          <div class="brand-mark">2F</div>
          <span>Auth</span>
        </div>
        <div class="clock">
          <span class="clock-dot"></span>
          <span class="clock-time" id="clockTime">--:--:--</span>
        </div>
      </header>

      <!-- 验证码圆环区 -->
      <section class="code-section">
        <div class="code-label">One-Time Code</div>

        <div class="code-stage" id="codeStage" role="button" tabindex="0" aria-label="点击复制验证码">
          <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
            <!-- 三套渐变 -->
            <defs>
              <linearGradient id="gradNormal" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#163f30"/>
                <stop offset="100%" stop-color="#2a8b66"/>
              </linearGradient>
              <linearGradient id="gradWarn" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#1f5f48"/>
                <stop offset="100%" stop-color="#d97a1f"/>
              </linearGradient>
              <linearGradient id="gradCrit" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#d97a1f"/>
                <stop offset="100%" stop-color="#c0392b"/>
              </linearGradient>
            </defs>
            <circle class="ring-track" cx="50" cy="50" r="46"/>
            <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46"
                    stroke-dasharray="289.03" stroke-dashoffset="0"/>
          </svg>

          <div class="code-inner">
            <div class="code placeholder" id="code">— — —</div>
            <div class="countdown" id="countdown">— — s</div>
          </div>
        </div>

        <div class="copy-hint" id="copyHint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyHintText">点击数字复制</span>
        </div>
      </section>

      <!-- 分隔线 -->
      <div class="divider"></div>

      <!-- 密钥输入区 -->
      <section class="input-section">
        <div class="input-header">
          <span>Secret Key</span>
          <button class="clear-btn" id="clearBtn" type="button">清空</button>
        </div>
        <input class="secret-input" id="secret" autocomplete="off" spellcheck="false" placeholder="在此处输入密钥" />
        <div class="message" id="message"></div>
      </section>

      <!-- 三列特性 -->
      <section class="features">
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <div class="feature-title">本地计算</div>
          <div class="feature-desc">密钥不上传</div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="feature-title">即时刷新</div>
          <div class="feature-desc">每 30 秒</div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </div>
          <div class="feature-title">点击复制</div>
          <div class="feature-desc">一键到剪贴板</div>
        </div>
      </section>

    </div>
  </main>

  <script>
    // ====== DOM 元素 ======
    const secretInput = document.getElementById("secret");
    const codeEl = document.getElementById("code");
    const messageEl = document.getElementById("message");
    const countdownEl = document.getElementById("countdown");
    const ringProgress = document.getElementById("ringProgress");
    const codeStage = document.getElementById("codeStage");
    const copyHint = document.getElementById("copyHint");
    const copyHintText = document.getElementById("copyHintText");
    const clearBtn = document.getElementById("clearBtn");
    const clockTimeEl = document.getElementById("clockTime");

    // ====== 常量 ======
    const PERIOD = 30;
    const DIGITS = 6;
    const RING_CIRCUMFERENCE = 2 * Math.PI * 46;
    let lastCounter = null;

    // ====== 从 URL hash 读密钥 ======
    function getSecretFromUrl() {
      const hashSecret = decodeURIComponent(location.hash.replace(/^#/, "").trim());
      return hashSecret || "";
    }

    // ====== 提取密钥（支持 otpauth://） ======
    function extractSecret(input) {
      let value = input.trim();
      if (value.toLowerCase().startsWith("otpauth://")) {
        try {
          const url = new URL(value);
          value = url.searchParams.get("secret") || "";
        } catch (_) {
          throw new Error("otpauth 链接格式不正确");
        }
      }
      return value.replace(/\s+/g, "").replace(/=+$/g, "").toUpperCase();
    }

    // ====== Base32 解码 ======
    function base32Decode(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      if (!base32) throw new Error("请输入密钥以生成验证码");

      for (const char of base32) {
        const value = alphabet.indexOf(char);
        if (value === -1) throw new Error("密钥仅支持 A-Z / 2-7 或 otpauth:// 链接");
        bits += value.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      view.setUint32(0, Math.floor(counter / 0x100000000), false);
      view.setUint32(4, counter >>> 0, false);
      return buffer;
    }

    // ====== TOTP 算法 ======
    async function generateTOTP(secret, digits = DIGITS, period = PERIOD) {
      const keyBytes = base32Decode(secret);
      const counter = Math.floor(Date.now() / 1000 / period);

      const cryptoKey = await crypto.subtle.importKey(
        "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
      );

      const hmac = new Uint8Array(
        await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter))
      );

      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** digits).padStart(digits, "0");
    }

    function formatCode(code) {
      return code.slice(0, 3) + " " + code.slice(3);
    }

    // ====== 更新圆环和颜色 ======
    function updateRing(remaining) {
      const ratio = remaining / PERIOD;
      ringProgress.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - ratio);

      ringProgress.classList.remove("warn", "crit");
      countdownEl.classList.remove("warn", "crit");
      if (remaining <= 5) {
        ringProgress.classList.add("crit");
        countdownEl.classList.add("crit");
      } else if (remaining <= 10) {
        ringProgress.classList.add("warn");
        countdownEl.classList.add("warn");
      }
    }

    function updateClock() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      clockTimeEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    // ====== 主刷新循环 ======
    async function updateCode(force = false) {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);

      countdownEl.textContent = String(remaining).padStart(2, "0") + " s";
      updateRing(remaining);
      updateClock();

      if (!force && counter === lastCounter) return;
      lastCounter = counter;

      const rawSecret = secretInput.value;
      if (!rawSecret.trim()) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = "";
        return;
      }

      try {
        if (!window.crypto || !crypto.subtle) {
          throw new Error("当前浏览器不支持 Web Crypto");
        }

        const secret = extractSecret(rawSecret);
        const code = await generateTOTP(secret);
        codeEl.textContent = formatCode(code);
        codeEl.classList.remove("placeholder");
        codeEl.classList.remove("flash");
        void codeEl.offsetWidth;
        codeEl.classList.add("flash");
        messageEl.textContent = "";
        messageEl.classList.remove("success");
      } catch (error) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = error.message || "生成失败";
        messageEl.classList.remove("success");
      }
    }

    secretInput.addEventListener("input", () => {
      lastCounter = null;
      updateCode(true);
    });

    // ====== 复制 ======
    async function copyCode(event) {
      const raw = codeEl.textContent.replace(/\s/g, "");
      if (!/^\d{6}$/.test(raw)) {
        messageEl.textContent = "请先输入有效密钥";
        messageEl.classList.remove("success");
        return;
      }

      if (event && event.clientX !== undefined) {
        const rect = codeStage.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = (event.clientX - rect.left) + "px";
        ripple.style.top = (event.clientY - rect.top) + "px";
        ripple.style.width = ripple.style.height = "20px";
        codeStage.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      }

      try {
        await navigator.clipboard.writeText(raw);
        copyHint.classList.add("success");
        copyHintText.textContent = "已复制 " + formatCode(raw);
        setTimeout(() => {
          copyHint.classList.remove("success");
          copyHintText.textContent = "点击数字复制";
        }, 1800);
      } catch (_) {
        messageEl.textContent = "复制失败，请手动选择";
        messageEl.classList.remove("success");
      }
    }

    codeStage.addEventListener("click", copyCode);
    codeStage.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); copyCode(); }
    });

    clearBtn.addEventListener("click", () => {
      secretInput.value = "";
      codeEl.textContent = "— — —";
      codeEl.classList.add("placeholder");
      messageEl.textContent = "";
      lastCounter = null;
      secretInput.focus();
    });

    const urlSecret = getSecretFromUrl();
    if (urlSecret) secretInput.value = urlSecret;

    updateClock();
    setInterval(() => updateCode(false), 250);
    updateCode(true);
  </script>
</body>
