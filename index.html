<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 禁止双击放大、捏合缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>两步验证</title>
  <style>
    /* ====== 设计令牌 ====== */
    :root {
      /* 主题色 */
      --green: #1f5f48;
      --green-bright: #2a8b66;
      --green-deep: #163f30;
      --warn: #d97a1f;
      --crit: #c0392b;

      /* 文字色 */
      --ink: #1a2620;
      --ink-soft: #3a4a42;
      --ink-dim: #6a7a72;
      --ink-mute: #9aa6a0;

      /* 毛玻璃面板 */
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-bg-strong: rgba(255, 255, 255, 0.72);
      --glass-bg-soft: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-border-soft: rgba(255, 255, 255, 0.4);

      /* 阴影 */
      --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.7) inset,
                     0 20px 50px -20px rgba(31, 95, 72, 0.25),
                     0 4px 20px -4px rgba(60, 80, 70, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ====== 全局：一屏锁死，禁止滚动和缩放 ====== */
    html { height: 100%; overflow: hidden; }

    body {
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro SC",
        "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "微软雅黑", sans-serif;
      color: var(--ink);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      touch-action: manipulation;
      position: relative;
      /* 基础背景：暖白 */
      background: #f5f3ec;
    }

    /* ====== 背景渐变光斑层 ======
       三个柔和的彩色光斑，作为毛玻璃面板下方的色彩基底
       让毛玻璃有"折射"的视觉感 */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(42, 139, 102, 0.35), transparent 60%),
        radial-gradient(ellipse 55% 45% at 85% 80%, rgba(217, 122, 31, 0.22), transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255, 220, 180, 0.4), transparent 70%);
      pointer-events: none;
    }

    /* ====== 背景纹理点：增加质感 ====== */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image: radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
      pointer-events: none;
    }

    /* 让所有内容浮在背景层之上 */
    body > * { position: relative; z-index: 2; }

    /* ====== 顶部毛玻璃提示条 ====== */
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(31, 95, 72, 0.55);
      color: rgba(255, 255, 255, 0.98);
      font-size: 14px;
      padding: 14px 24px;
      font-weight: 500;
      letter-spacing: 0.3px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 8px 32px rgba(22, 63, 48, 0.18);
    }

    .topbar strong { font-weight: 600; color: #fff; }

    /* ====== 导航栏：左 logo / 右时钟 ====== */
    .nav {
      flex-shrink: 0;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 18px;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--green-bright) 0%, var(--green) 60%, var(--green-deep) 100%);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.25) inset,
        0 8px 16px -3px rgba(31, 95, 72, 0.5);
    }

    /* 时钟：毛玻璃胶囊 */
    .clock {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px 7px 11px;
      background: var(--glass-bg-strong);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      font-size: 13px;
      color: var(--ink-soft);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
    }

    .clock-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(31, 95, 72, 0.18);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    .clock-label { color: var(--ink-mute); font-size: 12px; letter-spacing: 0.5px; }

    .clock-time {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 600;
      font-size: 13px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
    }

    /* ====== 主舞台：占满剩余空间，内容居中 ====== */
    .stage {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ====== 大毛玻璃容器：包裹所有核心功能 ======
       这是整个页面的视觉主体 */
    .glass-panel {
      width: 100%;
      max-width: 460px;
      padding: 32px 28px 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow: var(--shadow-card);
      animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ====== 验证码区 ====== */
    .code-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .code-label {
      font-size: 11.5px;
      letter-spacing: 1.8px;
      color: var(--ink-dim);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 18px;
    }

    /* 圆环 + 验证码容器 */
    .code-stage {
      position: relative;
      width: 240px;
      height: 240px;
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.15s ease;
      border-radius: 50%;
    }

    .code-stage:active { transform: scale(0.985); }

    /* SVG 圆环 */
    .ring {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);  /* 从 12 点钟方向开始 */
      pointer-events: none;
    }

    .ring circle {
      fill: none;
      stroke-width: 5;            /* 加粗：毛玻璃主题下圆环要够明显 */
    }

    .ring-track {
      stroke: rgba(31, 95, 72, 0.12);  /* 半透明绿轨道 */
    }

    .ring-progress {
      /* 引用 SVG 内的渐变 ID（动态切换） */
      stroke: url(#gradNormal);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.95s linear;
      filter: drop-shadow(0 2px 6px rgba(31, 95, 72, 0.3));
    }

    /* 通过 class 切换渐变引用，实现颜色变化 */
    .ring-progress.warn { stroke: url(#gradWarn); }
    .ring-progress.crit { stroke: url(#gradCrit); }

    /* 圆环内文字 */
    .code-inner {
      width: 78%;
      text-align: center;
    }

    /* 验证码数字 */
    .code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 700;
      font-size: 44px;
      letter-spacing: -1px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: opacity 0.25s ease;
    }

    .code.placeholder {
      color: var(--ink-mute);
      font-weight: 600;
      letter-spacing: 4px;
    }

    .code.flash { animation: codeFlash 0.5s ease; }

    @keyframes codeFlash {
      0%   { opacity: 0; transform: translateY(4px); filter: blur(3px); }
      100% { opacity: 1; transform: translateY(0);   filter: blur(0); }
    }

    /* 倒计时秒数 */
    .countdown {
      margin-top: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 16px;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      transition: color 0.4s ease;
    }

    .countdown.warn { color: var(--warn); }
    .countdown.crit { color: var(--crit); }

    /* "点击数字复制" 提示 */
    .copy-hint {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--ink-dim);
      font-weight: 500;
      transition: color 0.25s ease;
    }

    .copy-hint.success { color: var(--green); font-weight: 600; }
    .copy-hint svg { width: 13px; height: 13px; stroke-width: 2; }

    /* 复制水波纹 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.2;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: ripple 0.7s ease-out forwards;
    }

    @keyframes ripple {
      to { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    /* ====== 分隔线 ====== */
    .divider {
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(31, 95, 72, 0.15) 20%,
        rgba(31, 95, 72, 0.15) 80%,
        transparent
      );
    }

    /* ====== 输入区 ====== */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11.5px;
      letter-spacing: 1.2px;
      color: var(--ink-dim);
      font-weight: 600;
      text-transform: uppercase;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--ink-mute);
      font-size: 11.5px;
      cursor: pointer;
      padding: 0;
      font-weight: 500;
      transition: color 0.15s ease;
      font-family: inherit;
      letter-spacing: 0.5px;
    }

    .clear-btn:hover { color: var(--green); }

    /* 密钥输入框：毛玻璃风格 */
    .secret-input {
      width: 100%;
      padding: 13px 16px;
      background: var(--glass-bg-strong);
      border: 1px solid var(--glass-border-soft);
      border-radius: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 16px;            /* iOS 防缩放：必须 >= 16px */
      letter-spacing: 0.5px;
      color: var(--ink);
      outline: none;
      font-weight: 500;
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .secret-input::placeholder {
      color: var(--ink-mute);
      font-weight: 400;
    }

    .secret-input:focus {
      border-color: var(--green);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 4px rgba(31, 95, 72, 0.12);
    }

    /* 错误/成功提示 */
    .message {
      font-size: 12px;
      text-align: center;
      color: var(--crit);
      font-weight: 500;
      min-height: 14px;
    }

    .message.success { color: var(--green); }
    .message:empty { min-height: 0; }

    /* ====== 三列功能特性带 ====== */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    /* 单个特性：毛玻璃小卡片 */
    .feature {
      padding: 12px 8px;
      background: var(--glass-bg-soft);
      border: 1px solid var(--glass-border-soft);
      border-radius: 14px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s, transform 0.2s;
    }

    .feature:hover {
      background: var(--glass-bg);
      transform: translateY(-1px);
    }

    .feature-icon {
      width: 22px;
      height: 22px;
      margin: 0 auto 5px;
      display: grid;
      place-items: center;
      color: var(--green);
    }

    .feature-icon svg { width: 18px; height: 18px; stroke-width: 1.8; }

    .feature-title {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.2px;
    }

    .feature-desc {
      font-size: 10px;
      color: var(--ink-dim);
      margin-top: 1px;
      line-height: 1.3;
    }

    /* ====== 底部页脚 ====== */
    .footer {
      flex-shrink: 0;
      padding: 12px 24px 14px;
      text-align: center;
      font-size: 10.5px;
      letter-spacing: 1.2px;
      color: var(--ink-mute);
      font-weight: 500;
      text-transform: uppercase;
    }

    .footer .dot {
      display: inline-block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--ink-mute);
      vertical-align: middle;
      margin: 0 8px 2px;
    }

    /* ====== 手机适配 ====== */
    @media (max-width: 480px) {
      .topbar { font-size: 13px; padding: 11px 16px; }

      .nav { padding: 12px 16px; }
      .logo { font-size: 16px; gap: 9px; }
      .logo-mark { width: 30px; height: 30px; font-size: 12px; }

      /* 手机端时钟简化 */
      .clock { padding: 6px 11px 6px 9px; gap: 6px; }
      .clock-label { display: none; }
      .clock-time { font-size: 12px; }

      .stage { padding: 12px; }

      /* 毛玻璃主面板：撑满宽度，减少内边距 */
      .glass-panel {
        max-width: 100%;
        padding: 22px 20px 18px;
        border-radius: 26px;
        gap: 16px;
      }

      .code-label { font-size: 10.5px; margin-bottom: 14px; letter-spacing: 1.5px; }

      /* 圆环自适应：屏幕宽度 56% */
      .code-stage {
        width: min(220px, 56vw);
        height: min(220px, 56vw);
      }

      .ring circle { stroke-width: 4.5; }

      .code { font-size: clamp(34px, 9vw, 42px); }
      .countdown { font-size: 14px; margin-top: 10px; }
      .copy-hint { margin-top: 12px; font-size: 12px; }

      .input-header { font-size: 11px; }
      .clear-btn { font-size: 11px; }
      .secret-input { padding: 12px 14px; }

      .features { gap: 8px; }
      .feature { padding: 10px 6px; border-radius: 12px; }
      .feature-icon { width: 20px; height: 20px; margin-bottom: 4px; }
      .feature-icon svg { width: 16px; height: 16px; }
      .feature-title { font-size: 11px; }
      .feature-desc { font-size: 9.5px; }

      .footer { padding: 8px 16px 12px; font-size: 9.5px; }
    }

    /* ====== 极小屏幕（iPhone SE 等，高度 ≤ 680px） ====== */
    @media (max-height: 680px) and (max-width: 480px) {
      .topbar { padding: 9px 14px; font-size: 12px; }
      .nav { padding: 8px 14px; }
      .logo-mark { width: 26px; height: 26px; font-size: 11px; }
      .logo { font-size: 14.5px; }

      .stage { padding: 6px 12px; }

      .glass-panel {
        padding: 14px 16px 12px;
        border-radius: 22px;
        gap: 10px;
      }

      .code-label { font-size: 10px; margin-bottom: 8px; }
      .code-stage { width: min(180px, 48vw); height: min(180px, 48vw); }
      .countdown { margin-top: 6px; font-size: 13px; }
      .copy-hint { margin-top: 8px; font-size: 11px; }

      .secret-input { padding: 9px 12px; }

      .features { gap: 6px; }
      .feature { padding: 8px 4px; border-radius: 10px; }
      .feature-icon { width: 18px; height: 18px; margin-bottom: 3px; }
      .feature-icon svg { width: 14px; height: 14px; }
      .feature-title { font-size: 10px; }
      .feature-desc { font-size: 9px; }

      .footer { padding: 4px 12px 8px; font-size: 9px; }
    }
  </style>
</head>
<body>

  <!-- 顶部毛玻璃提示条 -->
  <div class="topbar">
    <strong>本地计算 · 安全无忧</strong>
  </div>

  <!-- 导航栏 -->
  <nav class="nav">
    <div class="logo">
      <div class="logo-mark">2F</div>
      <span>Auth</span>
    </div>
    <div class="clock">
      <span class="clock-dot"></span>
      <span class="clock-label">当前</span>
      <span class="clock-time" id="clockTime">--:--:--</span>
    </div>
  </nav>

  <!-- 主舞台 -->
  <main class="stage">
    <!-- 大毛玻璃面板 -->
    <div class="glass-panel">

      <!-- ===== 验证码圆环区 ===== -->
      <section class="code-section">
        <div class="code-label">One-Time Code</div>

        <!-- 整个圆环点击复制 -->
        <div class="code-stage" id="codeStage" role="button" tabindex="0" aria-label="点击复制验证码">
          <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
            <!-- ====== 三套渐变定义 ====== -->
            <defs>
              <!-- 正常状态：深绿 → 鲜绿 -->
              <linearGradient id="gradNormal" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#163f30"/>
                <stop offset="100%" stop-color="#2a8b66"/>
              </linearGradient>
              <!-- 警告状态：绿 → 橙（≤10秒） -->
              <linearGradient id="gradWarn" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#1f5f48"/>
                <stop offset="100%" stop-color="#d97a1f"/>
              </linearGradient>
              <!-- 紧急状态：橙 → 红（≤5秒） -->
              <linearGradient id="gradCrit" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#d97a1f"/>
                <stop offset="100%" stop-color="#c0392b"/>
              </linearGradient>
            </defs>

            <!-- 背景轨道 -->
            <circle class="ring-track" cx="50" cy="50" r="46"/>
            <!-- 前景进度（颜色用渐变） -->
            <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46"
                    stroke-dasharray="289.03" stroke-dashoffset="0"/>
          </svg>

          <div class="code-inner">
            <div class="code placeholder" id="code">— — —</div>
            <div class="countdown" id="countdown">— — s</div>
          </div>
        </div>

        <!-- 复制提示 -->
        <div class="copy-hint" id="copyHint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyHintText">点击数字复制</span>
        </div>
      </section>

      <!-- 分隔线 -->
      <div class="divider"></div>

      <!-- ===== 密钥输入区 ===== -->
      <section class="input-section">
        <div class="input-header">
          <span>Secret Key</span>
          <button class="clear-btn" id="clearBtn" type="button">清空</button>
        </div>
        <input class="secret-input" id="secret" autocomplete="off" spellcheck="false" placeholder="在此处输入密钥" />
        <div class="message" id="message"></div>
      </section>

      <!-- ===== 三列功能特性 ===== -->
      <section class="features">
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <div class="feature-title">本地计算</div>
          <div class="feature-desc">密钥不上传</div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="feature-title">即时刷新</div>
          <div class="feature-desc">每 30 秒</div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </div>
          <div class="feature-title">点击复制</div>
          <div class="feature-desc">一键到剪贴板</div>
        </div>
      </section>
    </div>
  </main>

  <!-- 底部页脚 -->
  <footer class="footer">
    SHA-1 <span class="dot"></span> 6 digits <span class="dot"></span> 30s
  </footer>

  <script>
    // ====== DOM 元素 ======
    const secretInput = document.getElementById("secret");
    const codeEl = document.getElementById("code");
    const messageEl = document.getElementById("message");
    const countdownEl = document.getElementById("countdown");
    const ringProgress = document.getElementById("ringProgress");
    const codeStage = document.getElementById("codeStage");
    const copyHint = document.getElementById("copyHint");
    const copyHintText = document.getElementById("copyHintText");
    const clearBtn = document.getElementById("clearBtn");
    const clockTimeEl = document.getElementById("clockTime");

    // ====== 常量 ======
    const PERIOD = 30;                          // TOTP 周期
    const DIGITS = 6;                           // 验证码位数
    const RING_CIRCUMFERENCE = 2 * Math.PI * 46; // 圆环周长（r=46）
    let lastCounter = null;

    // ====== 从 URL hash 读取密钥 ======
    function getSecretFromUrl() {
      const hashSecret = decodeURIComponent(location.hash.replace(/^#/, "").trim());
      return hashSecret || "";
    }

    // ====== 提取密钥（支持 otpauth://） ======
    function extractSecret(input) {
      let value = input.trim();
      if (value.toLowerCase().startsWith("otpauth://")) {
        try {
          const url = new URL(value);
          value = url.searchParams.get("secret") || "";
        } catch (_) {
          throw new Error("otpauth 链接格式不正确");
        }
      }
      return value.replace(/\s+/g, "").replace(/=+$/g, "").toUpperCase();
    }

    // ====== Base32 解码 ======
    function base32Decode(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      if (!base32) throw new Error("请输入密钥以生成验证码");

      for (const char of base32) {
        const value = alphabet.indexOf(char);
        if (value === -1) throw new Error("密钥仅支持 A-Z / 2-7 或 otpauth:// 链接");
        bits += value.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    // ====== 计数器转 8 字节大端序 ======
    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      view.setUint32(0, Math.floor(counter / 0x100000000), false);
      view.setUint32(4, counter >>> 0, false);
      return buffer;
    }

    // ====== TOTP 核心：HMAC-SHA1 + 截断 ======
    async function generateTOTP(secret, digits = DIGITS, period = PERIOD) {
      const keyBytes = base32Decode(secret);
      const counter = Math.floor(Date.now() / 1000 / period);

      const cryptoKey = await crypto.subtle.importKey(
        "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
      );

      const hmac = new Uint8Array(
        await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter))
      );

      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** digits).padStart(digits, "0");
    }

    // ====== 格式化验证码：123456 → 123 456 ======
    function formatCode(code) {
      return code.slice(0, 3) + " " + code.slice(3);
    }

    // ====== 更新圆环进度和颜色 ======
    function updateRing(remaining) {
      const ratio = remaining / PERIOD;
      ringProgress.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - ratio);

      ringProgress.classList.remove("warn", "crit");
      countdownEl.classList.remove("warn", "crit");

      if (remaining <= 5) {
        // 紧急：橙→红渐变
        ringProgress.classList.add("crit");
        countdownEl.classList.add("crit");
      } else if (remaining <= 10) {
        // 警告：绿→橙渐变
        ringProgress.classList.add("warn");
        countdownEl.classList.add("warn");
      }
      // 默认：深绿→鲜绿渐变
    }

    // ====== 更新右上角时钟 ======
    function updateClock() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      clockTimeEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    // ====== 主刷新函数：每 250ms 调用 ======
    async function updateCode(force = false) {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);

      countdownEl.textContent = String(remaining).padStart(2, "0") + " s";
      updateRing(remaining);
      updateClock();

      if (!force && counter === lastCounter) return;
      lastCounter = counter;

      const rawSecret = secretInput.value;
      if (!rawSecret.trim()) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = "";
        return;
      }

      try {
        if (!window.crypto || !crypto.subtle) {
          throw new Error("当前浏览器不支持 Web Crypto");
        }

        const secret = extractSecret(rawSecret);
        const code = await generateTOTP(secret);
        codeEl.textContent = formatCode(code);
        codeEl.classList.remove("placeholder");
        codeEl.classList.remove("flash");
        void codeEl.offsetWidth;  // 触发重排，让动画重播
        codeEl.classList.add("flash");
        messageEl.textContent = "";
        messageEl.classList.remove("success");
      } catch (error) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = error.message || "生成失败";
        messageEl.classList.remove("success");
      }
    }

    // ====== 输入即生成 ======
    secretInput.addEventListener("input", () => {
      lastCounter = null;
      updateCode(true);
    });

    // ====== 点击复制 ======
    async function copyCode(event) {
      const raw = codeEl.textContent.replace(/\s/g, "");
      if (!/^\d{6}$/.test(raw)) {
        messageEl.textContent = "请先输入有效密钥";
        messageEl.classList.remove("success");
        return;
      }

      // 水波纹
      if (event && event.clientX !== undefined) {
        const rect = codeStage.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = (event.clientX - rect.left) + "px";
        ripple.style.top = (event.clientY - rect.top) + "px";
        ripple.style.width = ripple.style.height = "20px";
        codeStage.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      }

      try {
        await navigator.clipboard.writeText(raw);
        copyHint.classList.add("success");
        copyHintText.textContent = "已复制 " + formatCode(raw);
        setTimeout(() => {
          copyHint.classList.remove("success");
          copyHintText.textContent = "点击数字复制";
        }, 1800);
      } catch (_) {
        messageEl.textContent = "复制失败，请手动选择";
        messageEl.classList.remove("success");
      }
    }

    codeStage.addEventListener("click", copyCode);
    codeStage.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); copyCode(); }
    });

    // ====== 清空按钮 ======
    clearBtn.addEventListener("click", () => {
      secretInput.value = "";
      codeEl.textContent = "— — —";
      codeEl.classList.add("placeholder");
      messageEl.textContent = "";
      lastCounter = null;
      secretInput.focus();
    });

    // ====== 初始化 ======
    const urlSecret = getSecretFromUrl();
    if (urlSecret) secretInput.value = urlSecret;

    updateClock();
    setInterval(() => updateCode(false), 250);
    updateCode(true);
  </script>
</body>
</html>
