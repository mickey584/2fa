<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>两步验证</title>
  <style>
    :root{
      --bg:#eef7ff;
      --ink:#111827;
      --muted:#7b8494;
      --line:rgba(255,255,255,.52);
      --glass:rgba(255,255,255,.34);
      --glass-strong:rgba(255,255,255,.48);
      --blue:#3ba7ff;
      --purple:#8d5cff;
      --orange:#ff9a3d;
      --green:#20b486;
      --warn:#ff9f2d;
      --crit:#ff3b5f;
      --shadow:0 24px 70px rgba(48,58,86,.18), inset 0 1px 0 rgba(255,255,255,.7);
      --mx:0px;
      --my:0px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html,body{height:100%;overflow-x:hidden}

    body{
      min-height:100dvh;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro SC","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
      color:var(--ink);
      background:
        linear-gradient(135deg,#dff5ff 0%,#f3edff 48%,#fff2d9 100%);
      -webkit-font-smoothing:antialiased;
      touch-action:pan-y;
      overscroll-behavior-x:none;
      position:relative;
    }

    .aurora{
      position:fixed;
      inset:-12%;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .blob{
      position:absolute;
      width:46vmax;
      height:46vmax;
      border-radius:999px;
      filter:blur(42px) saturate(150%);
      opacity:.58;
      transform:translate3d(calc(var(--mx) * var(--depth)), calc(var(--my) * var(--depth)),0);
      transition:transform .22s ease-out;
      animation:float 14s ease-in-out infinite alternate;
    }

    .blob.blue{left:-14vmax;top:-12vmax;background:radial-gradient(circle,rgba(59,167,255,.78),rgba(59,167,255,0) 66%);--depth:.035}
    .blob.purple{right:-10vmax;top:-8vmax;background:radial-gradient(circle,rgba(141,92,255,.68),rgba(141,92,255,0) 68%);--depth:-.03;animation-duration:17s}
    .blob.orange{right:-12vmax;bottom:-16vmax;background:radial-gradient(circle,rgba(255,154,61,.72),rgba(255,154,61,0) 66%);--depth:.025;animation-duration:19s}

    @keyframes float{
      from{translate:0 0;scale:1}
      to{translate:4vmax 3vmax;scale:1.08}
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background-image:radial-gradient(rgba(255,255,255,.48) 1px,transparent 1px);
      background-size:24px 24px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.5),transparent 78%);
      -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,.5),transparent 78%);
    }

    .page{
      position:relative;
      z-index:2;
      min-height:100dvh;
      padding:24px;
      display:grid;
      place-items:center;
    }

    .shell{
      width:min(100%,1040px);
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
      align-items:stretch;
    }

    .hero,
    .panel{
      border:1px solid var(--line);
      background:linear-gradient(135deg,rgba(255,255,255,.52),rgba(255,255,255,.20));
      backdrop-filter:blur(34px) saturate(190%);
      -webkit-backdrop-filter:blur(34px) saturate(190%);
      box-shadow:var(--shadow);
      border-radius:34px;
      overflow:hidden;
      position:relative;
    }

    .hero::before,
    .panel::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at calc(20% + var(--mx) * .02) calc(0% + var(--my) * .02),rgba(59,167,255,.20),transparent 38%),
        radial-gradient(circle at calc(100% + var(--mx) * -.02) calc(100% + var(--my) * -.02),rgba(255,154,61,.20),transparent 42%),
        linear-gradient(135deg,rgba(255,255,255,.38),transparent 48%);
    }

    .hero{
      grid-column:span 7;
      min-height:560px;
      padding:34px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .panel{
      grid-column:span 5;
      min-height:560px;
      padding:34px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:24px;
    }

    .brand-row,.status-row,.action-row{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .brand{display:flex;align-items:center;gap:14px;font-weight:800;font-size:28px;letter-spacing:-.8px}
    .mark{
      width:52px;height:52px;border-radius:18px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;
      background:linear-gradient(135deg,var(--blue),var(--purple) 52%,var(--orange));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.42),0 12px 28px rgba(100,88,255,.25);
    }

    .clock,.badge{
      display:flex;align-items:center;gap:8px;
      min-height:40px;padding:0 14px;border-radius:999px;
      background:rgba(255,255,255,.42);
      border:1px solid rgba(255,255,255,.55);
      backdrop-filter:blur(18px) saturate(180%);
      -webkit-backdrop-filter:blur(18px) saturate(180%);
      color:#273142;font-weight:700;font-size:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.58);
    }

    .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(32,180,134,.18);animation:pulse 1.9s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.55;transform:scale(.9)}}
    .mono{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}

    .hero-copy{position:relative;margin-top:28px}
    .kicker{font-size:13px;font-weight:800;letter-spacing:2.8px;color:#778190;text-transform:uppercase;margin-bottom:16px}
    h1{font-size:clamp(44px,5vw,70px);line-height:.96;letter-spacing:-3.2px;margin-bottom:18px}
    .sub{max-width:520px;font-size:18px;line-height:1.65;color:#687386;font-weight:550}

    .mini-note{position:relative;display:flex;gap:10px;align-items:center;color:#657085;font-weight:650;font-size:14px}
    .mini-note svg{width:18px;height:18px;color:var(--purple)}

    .code-section{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px}
    .label{font-size:13px;font-weight:850;letter-spacing:3px;color:#7a8493;text-transform:uppercase}

    .code-stage{
      position:relative;width:min(56vh,270px);height:min(56vh,270px);max-width:270px;max-height:270px;
      min-width:210px;min-height:210px;display:grid;place-items:center;border-radius:999px;cursor:pointer;user-select:none;-webkit-user-select:none;
    }
    .code-stage:active{transform:scale(.985)}

    .ring{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);pointer-events:none}
    .ring circle{fill:none;stroke-width:5.2}
    .ring-track{stroke:rgba(84,98,125,.12)}
    .ring-progress{stroke:url(#gradNormal);stroke-linecap:round;transition:stroke-dashoffset .95s linear;filter:drop-shadow(0 7px 14px rgba(60,167,255,.20))}
    .ring-progress.warn{stroke:url(#gradWarn);filter:drop-shadow(0 7px 14px rgba(255,159,45,.22))}
    .ring-progress.crit{stroke:url(#gradCrit);filter:drop-shadow(0 7px 14px rgba(255,59,95,.24))}

    .code-inner{position:relative;z-index:1}
    .code{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;font-size:clamp(38px,5vw,56px);font-weight:850;letter-spacing:-1px;color:#172033;font-variant-numeric:tabular-nums;line-height:1}
    .code.placeholder{letter-spacing:14px;color:rgba(74,85,104,.44)}
    .code.flash{animation:codeFlash .42s ease}
    @keyframes codeFlash{from{opacity:0;transform:translateY(8px);filter:blur(5px)}to{opacity:1;transform:none;filter:none}}

    .countdown{margin-top:14px;font-size:18px;font-weight:850;color:var(--green);transition:color .25s ease}
    .countdown.warn{color:var(--warn)}
    .countdown.crit{color:var(--crit)}

    .copy-hint{display:flex;align-items:center;gap:8px;color:#758093;font-weight:700;font-size:14px;transition:.2s ease}
    .copy-hint.success{color:var(--green)}
    .copy-hint svg{width:17px;height:17px}

    .form{position:relative;display:flex;flex-direction:column;gap:12px}
    .form-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .form-label{font-size:12px;font-weight:850;letter-spacing:2.2px;color:#798393;text-transform:uppercase}

    .clear-btn,.copy-btn{
      appearance:none;border:1px solid rgba(255,255,255,.55);height:42px;border-radius:999px;padding:0 18px;
      background:rgba(255,255,255,.38);backdrop-filter:blur(18px) saturate(170%);-webkit-backdrop-filter:blur(18px) saturate(170%);
      color:#303848;font:700 14px/1 inherit;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.62);transition:.18s ease;
    }
    .clear-btn:hover,.copy-btn:hover{background:rgba(255,255,255,.52);transform:translateY(-1px)}

    .secret-input{
      width:100%;height:62px;border:1px solid rgba(255,255,255,.52);border-radius:22px;padding:0 20px;
      background:rgba(255,255,255,.30);backdrop-filter:blur(18px) saturate(175%);-webkit-backdrop-filter:blur(18px) saturate(175%);
      outline:none;color:#1d2636;font-size:18px;font-weight:650;text-align:center;letter-spacing:.5px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.68),0 10px 30px rgba(40,52,80,.06);
    }
    .secret-input::placeholder{color:rgba(98,108,124,.48);font-weight:500}
    .secret-input:focus{border-color:rgba(141,92,255,.52);background:rgba(255,255,255,.46);box-shadow:0 0 0 4px rgba(141,92,255,.12),inset 0 1px 0 rgba(255,255,255,.74)}

    .message{min-height:18px;text-align:center;color:var(--crit);font-size:13px;font-weight:700}
    .message.success{color:var(--green)}
    .message:empty{min-height:0}

    .copy-btn{width:100%;height:52px;color:#fff;border:0;background:linear-gradient(135deg,var(--blue),var(--purple) 52%,var(--orange));box-shadow:0 16px 34px rgba(104,91,255,.26),inset 0 1px 0 rgba(255,255,255,.42)}
    .copy-btn:hover{background:linear-gradient(135deg,var(--blue),var(--purple) 52%,var(--orange));filter:saturate(1.08)}

    .ripple{position:absolute;border-radius:50%;background:var(--purple);opacity:.18;transform:translate(-50%,-50%) scale(0);pointer-events:none;animation:ripple .7s ease-out forwards}
    @keyframes ripple{to{transform:translate(-50%,-50%) scale(9);opacity:0}}

    @media (max-width:1024px){
      .page{padding:18px}
      .shell{width:min(100%,760px);grid-template-columns:repeat(6,1fr)}
      .hero,.panel{grid-column:span 6;min-height:auto}
      .hero{padding:28px;gap:38px}
      .panel{padding:30px;gap:22px}
      h1{font-size:46px;letter-spacing:-2px}
      .sub{font-size:16px}
      .code-stage{width:250px;height:250px}
    }

    @media (max-width:768px){
      body{overflow-y:auto}
      .page{min-height:100dvh;padding:calc(env(safe-area-inset-top) + 12px) 14px calc(env(safe-area-inset-bottom) + 18px)}
      .shell{display:block;width:100%}
      .hero{display:none}
      .panel{min-height:calc(100dvh - 30px);padding:22px 20px;border-radius:32px;justify-content:center;gap:20px}
      .brand-row{align-items:center}
      .brand{font-size:24px;gap:12px}
      .mark{width:46px;height:46px;border-radius:16px;font-size:18px}
      .clock{height:38px;padding:0 12px;font-size:13px}
      .label{font-size:12px;letter-spacing:2.6px}
      .code-stage{width:218px;height:218px;min-width:0;min-height:0}
      .code{font-size:42px}
      .code.placeholder{letter-spacing:12px}
      .countdown{font-size:17px;margin-top:10px}
      .form{gap:10px}
      .form-head{align-items:center}
      .clear-btn{height:36px;padding:0 16px;font-size:13px}
      .secret-input{height:56px;border-radius:19px;font-size:17px;padding:0 16px}
      .secret-input::placeholder{font-size:16px}
      .copy-btn{height:50px}
    }

    @media (max-width:380px), (max-height:720px) and (max-width:768px){
      .panel{gap:14px;padding:18px 18px;justify-content:center}
      .brand{font-size:22px}.mark{width:42px;height:42px}
      .code-stage{width:190px;height:190px}.code{font-size:36px}.countdown{font-size:15px;margin-top:8px}
      .copy-hint{font-size:13px}.secret-input{height:52px}.copy-btn{height:48px}
    }

    @media (min-width:1025px) and (max-height:820px){
      .page{padding:18px}
      .hero,.panel{min-height:calc(100dvh - 36px);max-height:calc(100dvh - 36px);padding:28px;border-radius:32px}
      .hero-copy{margin-top:18px}h1{font-size:52px}.sub{font-size:16px;line-height:1.55}
      .code-stage{width:min(48vh,240px);height:min(48vh,240px);min-width:210px;min-height:210px}
      .panel{gap:18px}.secret-input{height:56px}.copy-btn{height:48px}
    }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <div class="blob blue"></div>
    <div class="blob purple"></div>
    <div class="blob orange"></div>
  </div>

  <main class="page">
    <div class="shell">
      <section class="hero" aria-hidden="true">
        <div class="brand-row">
          <div class="badge"><span class="dot"></span>本地计算 · 安全无忧</div>
        </div>
        <div class="hero-copy">
          <div class="kicker">Two-Factor Authenticator</div>
          <h1>Liquid<br>Auth</h1>
          <p class="sub">极简两步验证工具。密钥仅在浏览器本地计算，不上传服务器。输入密钥后自动生成 30 秒动态验证码。</p>
        </div>
        <div class="mini-note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <span>所有计算均在当前设备完成</span>
        </div>
      </section>

      <section class="panel" aria-label="两步验证码">
        <header class="brand-row">
          <div class="brand">
            <div class="mark">2F</div>
            <span>Auth</span>
          </div>
          <div class="clock" aria-label="当前时间">
            <span class="dot"></span>
            <span class="mono" id="clockTime">00:00:00</span>
          </div>
        </header>

        <section class="code-section">
          <div class="label">One-Time Code</div>
          <div class="code-stage" id="codeStage" role="button" tabindex="0" aria-label="点击复制验证码">
            <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
              <defs>
                <linearGradient id="gradNormal" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#3ba7ff"></stop>
                  <stop offset="58%" stop-color="#8d5cff"></stop>
                  <stop offset="100%" stop-color="#20b486"></stop>
                </linearGradient>
                <linearGradient id="gradWarn" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#8d5cff"></stop>
                  <stop offset="100%" stop-color="#ff9f2d"></stop>
                </linearGradient>
                <linearGradient id="gradCrit" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ff9f2d"></stop>
                  <stop offset="100%" stop-color="#ff3b5f"></stop>
                </linearGradient>
              </defs>
              <circle class="ring-track" cx="50" cy="50" r="46"></circle>
              <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46" stroke-dasharray="289.03" stroke-dashoffset="0"></circle>
            </svg>
            <div class="code-inner">
              <div class="code placeholder" id="code">— — —</div>
              <div class="countdown mono" id="countdown">30 s</div>
            </div>
          </div>
          <div class="copy-hint" id="copyHint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <span id="copyHintText">点击数字复制</span>
          </div>
        </section>

        <section class="form">
          <div class="form-head">
            <div class="form-label">Secret Key</div>
            <button class="clear-btn" id="clearBtn" type="button">清空</button>
          </div>
          <input class="secret-input" id="secret" autocomplete="off" spellcheck="false" placeholder="在此处输入密钥" />
          <div class="message" id="message"></div>
          <button class="copy-btn" id="copyBtn" type="button">一键复制</button>
        </section>
      </section>
    </div>
  </main>

  <script>
    const secretInput = document.getElementById("secret");
    const codeEl = document.getElementById("code");
    const messageEl = document.getElementById("message");
    const countdownEl = document.getElementById("countdown");
    const ringProgress = document.getElementById("ringProgress");
    const codeStage = document.getElementById("codeStage");
    const copyBtn = document.getElementById("copyBtn");
    const copyHint = document.getElementById("copyHint");
    const copyHintText = document.getElementById("copyHintText");
    const clearBtn = document.getElementById("clearBtn");
    const clockTimeEl = document.getElementById("clockTime");

    const PERIOD = 30;
    const DIGITS = 6;
    const RING_CIRCUMFERENCE = 2 * Math.PI * 46;
    let lastCounter = null;

    window.addEventListener("pointermove", (event) => {
      const x = event.clientX - window.innerWidth / 2;
      const y = event.clientY - window.innerHeight / 2;
      document.documentElement.style.setProperty("--mx", x.toFixed(2) + "px");
      document.documentElement.style.setProperty("--my", y.toFixed(2) + "px");
    }, { passive: true });

    function getSecretFromUrl() {
      const hashSecret = decodeURIComponent(location.hash.replace(/^#/, "").trim());
      return hashSecret || "";
    }

    function extractSecret(input) {
      let value = input.trim();
      if (value.toLowerCase().startsWith("otpauth://")) {
        try {
          const url = new URL(value);
          value = url.searchParams.get("secret") || "";
        } catch (_) {
          throw new Error("otpauth 链接格式不正确");
        }
      }
      return value.replace(/\s+/g, "").replace(/=+$/g, "").toUpperCase();
    }

    function base32Decode(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];
      if (!base32) throw new Error("请输入密钥以生成验证码");
      for (const char of base32) {
        const value = alphabet.indexOf(char);
        if (value === -1) throw new Error("密钥仅支持 A-Z / 2-7 或 otpauth:// 链接");
        bits += value.toString(2).padStart(5, "0");
      }
      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      view.setUint32(0, Math.floor(counter / 0x100000000), false);
      view.setUint32(4, counter >>> 0, false);
      return buffer;
    }

    async function generateTOTP(secret, digits = DIGITS, period = PERIOD) {
      const keyBytes = base32Decode(secret);
      const counter = Math.floor(Date.now() / 1000 / period);
      const cryptoKey = await crypto.subtle.importKey("raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]);
      const hmac = new Uint8Array(await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter)));
      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary = ((hmac[offset] & 0x7f) << 24) | ((hmac[offset + 1] & 0xff) << 16) | ((hmac[offset + 2] & 0xff) << 8) | (hmac[offset + 3] & 0xff);
      return String(binary % 10 ** digits).padStart(digits, "0");
    }

    function formatCode(code) {
      return code.slice(0, 3) + " " + code.slice(3);
    }

    function updateRing(remaining) {
      const ratio = remaining / PERIOD;
      ringProgress.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - ratio);
      ringProgress.classList.remove("warn", "crit");
      countdownEl.classList.remove("warn", "crit");
      if (remaining <= 5) {
        ringProgress.classList.add("crit");
        countdownEl.classList.add("crit");
      } else if (remaining <= 10) {
        ringProgress.classList.add("warn");
        countdownEl.classList.add("warn");
      }
    }

    function updateClock() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      clockTimeEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    async function updateCode(force = false) {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);
      countdownEl.textContent = String(remaining).padStart(2, "0") + " s";
      updateRing(remaining);
      updateClock();
      if (!force && counter === lastCounter) return;
      lastCounter = counter;
      const rawSecret = secretInput.value;
      if (!rawSecret.trim()) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = "";
        return;
      }
      try {
        if (!window.crypto || !crypto.subtle) throw new Error("当前浏览器不支持 Web Crypto");
        const secret = extractSecret(rawSecret);
        const code = await generateTOTP(secret);
        codeEl.textContent = formatCode(code);
        codeEl.classList.remove("placeholder");
        codeEl.classList.remove("flash");
        void codeEl.offsetWidth;
        codeEl.classList.add("flash");
        messageEl.textContent = "";
        messageEl.classList.remove("success");
      } catch (error) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        messageEl.textContent = error.message || "生成失败";
        messageEl.classList.remove("success");
      }
    }

    async function copyCode(event) {
      const raw = codeEl.textContent.replace(/\s/g, "");
      if (!/^\d{6}$/.test(raw)) {
        messageEl.textContent = "请先输入有效密钥";
        messageEl.classList.remove("success");
        return;
      }
      if (event && event.clientX !== undefined) {
        const rect = codeStage.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = (event.clientX - rect.left) + "px";
        ripple.style.top = (event.clientY - rect.top) + "px";
        ripple.style.width = ripple.style.height = "22px";
        codeStage.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      }
      try {
        await navigator.clipboard.writeText(raw);
        copyHint.classList.add("success");
        copyHintText.textContent = "已复制 " + formatCode(raw);
        messageEl.textContent = "";
        setTimeout(() => {
          copyHint.classList.remove("success");
          copyHintText.textContent = "点击数字复制";
        }, 1600);
      } catch (_) {
        messageEl.textContent = "复制失败，请手动选择";
        messageEl.classList.remove("success");
      }
    }

    secretInput.addEventListener("input", () => {
      lastCounter = null;
      updateCode(true);
    });
    codeStage.addEventListener("click", copyCode);
    copyBtn.addEventListener("click", copyCode);
    codeStage.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        copyCode();
      }
    });
    clearBtn.addEventListener("click", () => {
      secretInput.value = "";
      codeEl.textContent = "— — —";
      codeEl.classList.add("placeholder");
      messageEl.textContent = "";
      lastCounter = null;
      secretInput.focus();
    });

    const urlSecret = getSecretFromUrl();
    if (urlSecret) secretInput.value = urlSecret;
    updateClock();
    setInterval(() => updateCode(false), 250);
    updateCode(true);
  </script>
</body>
</html>
