<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 防止手机端输入框聚焦时页面自动放大，避免布局被撑乱 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>两步验证</title>
  <style>
    :root {
      --bg: #faf8f3;
      --bg-soft: #f3f0e8;
      --paper: #ffffff;
      --ink: #1d1d1f;
      --ink-soft: #424245;
      --ink-dim: #6e6e73;
      --ink-mute: #a1a1a6;
      --line: #e6e2d6;
      --line-soft: #ede9dd;
      --green: #1f5f48;
      --green-deep: #163f30;
      --green-soft: #e7efea;
      --warn: #c9871f;
      --crit: #b03a3a;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro SC",
        "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "微软雅黑", sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 顶部固定毛玻璃提示条：固定在页面顶部，并加厚高度 */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(31, 95, 72, 0.78);
      color: rgba(255, 255, 255, 0.96);
      font-size: 14px;
      padding: 16px 24px;
      text-align: center;
      letter-spacing: 0.2px;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 10px 28px rgba(22, 63, 48, 0.16);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
    }

    .topbar strong {
      font-weight: 600;
      color: #fff;
    }

    /* 导航 —— 顶部条固定后，这里增加上边距，避免内容被 topbar 遮住 */
    .nav {
      max-width: 1280px;
      margin: 52px auto 0;
      width: 100%;
      padding: 22px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 19px;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2a8b66 0%, #1f5f48 60%, #163f30 100%);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.5px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.18) inset,
        0 8px 18px -4px rgba(31, 95, 72, 0.45);
    }

    /* 时钟胶囊 */
    .clock {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 8px 12px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13.5px;
      color: var(--ink-soft);
    }

    .clock-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(31, 95, 72, 0.15);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    .clock-label {
      color: var(--ink-mute);
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .clock-time {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 600;
      font-size: 13.5px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
    }

    /* 主舞台 —— 单柱居中 */
    .stage {
      flex: 1;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 28px 24px 40px;
      position: relative;
    }

    /* 装饰同心圆 */
    .decor-rings {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .decor-rings span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid var(--line-soft);
      border-radius: 50%;
    }

    .decor-rings span:nth-child(1) { width: 720px; height: 720px; opacity: 0.45; }
    .decor-rings span:nth-child(2) { width: 580px; height: 580px; opacity: 0.6; }
    .decor-rings span:nth-child(3) { width: 460px; height: 460px; opacity: 0.75; }

    .panel {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      /* 缩小卡片和输入框之间的距离，让手机端一屏更容易显示完整 */
      gap: 14px;
      animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 验证码卡片 */
    .code-card {
      width: 100%;
      padding: 40px 36px 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 30px 60px -25px rgba(31, 95, 72, 0.22),
        0 8px 20px -8px rgba(60, 50, 30, 0.08);
    }

    .code-card-label {
      font-size: 13px;
      letter-spacing: 1.5px;
      color: var(--ink-dim);
      text-transform: uppercase;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
    }

    .code-stage {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.15s ease;
      border-radius: 50%;
    }

    .code-stage:active { transform: scale(0.985); }

    .ring {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      pointer-events: none;
    }

    .ring circle {
      fill: none;
      stroke-width: 4;
    }

    .ring-track  { stroke: var(--line); }
    .ring-progress {
      stroke: var(--green);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.95s linear, stroke 0.3s ease;
    }

    .ring-progress.warn { stroke: var(--warn); }
    .ring-progress.crit { stroke: var(--crit); }

    .code-inner {
      width: 210px;
      text-align: center;
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 700;
      font-size: 50px;
      letter-spacing: -1px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: opacity 0.25s ease;
    }

    .code.placeholder {
      color: var(--ink-mute);
      font-weight: 600;
      letter-spacing: 4px;
    }

    .code.flash {
      animation: codeFlash 0.5s ease;
    }

    @keyframes codeFlash {
      0%   { opacity: 0; transform: translateY(4px); filter: blur(3px); }
      100% { opacity: 1; transform: translateY(0);   filter: blur(0); }
    }

    .countdown {
      margin-top: 16px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .countdown.warn { color: var(--warn); }
    .countdown.crit { color: var(--crit); }

    .copy-row {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px dashed var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13.5px;
      letter-spacing: 0.2px;
      color: var(--ink-dim);
      font-weight: 500;
      transition: color 0.25s ease;
    }

    .copy-row.success { color: var(--green); font-weight: 600; }
    .copy-row svg { width: 14px; height: 14px; stroke-width: 2; }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.18;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: ripple 0.7s ease-out forwards;
    }

    @keyframes ripple {
      to { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    /* 输入区 */
    .input-block {
      width: 100%;
      padding: 0 4px;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 12.5px;
      letter-spacing: 1px;
      color: var(--ink-dim);
      font-weight: 600;
      text-transform: uppercase;
    }

    .field-clear {
      background: none;
      border: none;
      color: var(--ink-mute);
      font-size: 12.5px;
      cursor: pointer;
      padding: 0;
      font-weight: 500;
      transition: color 0.15s ease;
      font-family: inherit;
      letter-spacing: 0.5px;
    }

    .field-clear:hover { color: var(--green); }

    input {
      width: 100%;
      padding: 16px 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      /* iOS Safari 聚焦小于 16px 的输入框会自动放大，这里固定 16px 防止页面缩放 */
      font-size: 16px;
      letter-spacing: 0.5px;
      color: var(--ink);
      outline: none;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      text-align: center;
    }

    input::placeholder {
      color: var(--ink-mute);
      letter-spacing: 0.5px;
      font-weight: 400;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(31, 95, 72, 0.12);
    }

    .error {
      margin-top: 10px;
      min-height: 18px;
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.1px;
      color: var(--crit);
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .error.success { color: var(--green); }

    /* 错误提示为空时不占高度：避免输入框和下方三个图标之间出现大块空白 */
    .error:empty {
      min-height: 0;
      margin-top: 0;
    }

    /* 三列特性带 */
    .features {
      width: 100%;
      max-width: 420px;
      /* 缩小输入框和下方三个图标卡片之间的距离 */
      margin: 14px auto 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      position: relative;
      z-index: 2;
      animation: fadeUp 1s 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .feature {
      padding: 16px 12px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .feature-icon {
      width: 28px;
      height: 28px;
      margin: 0 auto 8px;
      display: grid;
      place-items: center;
      color: var(--green);
    }

    .feature-icon svg { width: 22px; height: 22px; stroke-width: 1.8; }

    .feature-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.2px;
      margin-bottom: 2px;
    }

    .feature-desc {
      font-size: 11px;
      color: var(--ink-dim);
      letter-spacing: 0.1px;
      line-height: 1.4;
    }

    /* 底部 */
    .footer {
      padding: 16px 24px 20px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--ink-mute);
      font-weight: 500;
      text-transform: uppercase;
    }

    .footer .dot {
      display: inline-block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--ink-mute);
      vertical-align: middle;
      margin: 0 8px 2px;
    }

    /* 平板 */
    @media (max-width: 720px) {
      .decor-rings span:nth-child(1) { width: 540px; height: 540px; }
      .decor-rings span:nth-child(2) { width: 440px; height: 440px; }
      .decor-rings span:nth-child(3) { width: 350px; height: 350px; }
    }

    /* 手机 */
    /* =========================
   手机端整体布局优化
   目标：
   1. 首屏无需下拉
   2. Secret Key 和卡片有适当呼吸感
   3. footer 靠近功能区
   ========================= */
	@media (max-width: 480px) {

	  /* 页面整体高度不要强制撑满 */
	  body {
		min-height: auto;
	  }

	  /* 主区域上下压缩 */
	  .stage {
		padding: 8px 18px 8px;
	  }

	  /* 验证码卡片与输入区间距 */
	  .panel {
		gap: 10px;
		max-width: 360px;
	  }

	  /* 验证码卡片高度压缩 */
	  .code-card {
		padding: 22px 22px 16px;
		border-radius: 22px;
	  }

	  /* 圆环缩小 */
	  .code-stage {
		width: 210px;
		height: 210px;
	  }

	  .code-inner {
		width: 160px;
	  }

	  /* 验证码字体 */
	  .code {
		font-size: 34px;
	  }

	  /* 倒计时 */
	  .countdown {
		margin-top: 10px;
		font-size: 14px;
	  }

	  /* 点击复制区域 */
	  .copy-row {
		margin-top: 14px;
		padding-top: 12px;
	  }

	  /* Secret Key 区域 */
	  .input-block {
		padding: 0 2px;
		margin-top: 6px; /* 和上面稍微拉开 */
	  }

	  /* 输入框 */
	  input {
		padding: 12px 14px;
		font-size: 16px; /* 防止 iOS 自动放大 */
	  }

	  /* 错误提示不占空间 */
	  .error {
		min-height: 0;
		margin-top: 2px;
	  }

	  /* 三个功能卡片 */
	  .features {
		margin-top: 8px;
		gap: 8px;
		max-width: 360px;
	  }

	  .feature {
		padding: 10px 8px;
	  }

	  /* footer 不要再被顶到底部 */
	  .footer {
		padding: 8px 18px 14px;
		margin-top: 6px;
		font-size: 10px;
	  }
	}
  </style>
</head>
<body>
  <div class="topbar">
    <strong>本地计算 · 安全无忧</strong>
  </div>

  <nav class="nav">
    <div class="logo">
      <div class="logo-mark">2F</div>
      <span>Auth</span>
    </div>

    <div class="clock" id="clock">
      <span class="clock-dot"></span>
      <span class="clock-label">当前</span>
      <span class="clock-time" id="clockTime">--:--:--</span>
    </div>
  </nav>

  <main class="stage">
    <div class="decor-rings" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <div class="panel">
      <div class="code-card">
        <div class="code-card-label">One-Time Code</div>

        <div class="code-stage" id="codeStage" role="button" tabindex="0" aria-label="点击复制验证码">
          <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ring-track" cx="50" cy="50" r="46" />
            <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46"
                    stroke-dasharray="289.03" stroke-dashoffset="0" />
          </svg>
          <div class="code-inner">
            <div class="code placeholder" id="code">— — —</div>
            <div class="countdown" id="countdown">— — s</div>
          </div>
        </div>

        <div class="copy-row" id="copyRow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyRowText">点击数字复制</span>
        </div>
      </div>

      <div class="input-block">
        <div class="field-label">
          <span>Secret Key</span>
          <button class="field-clear" id="clearBtn" type="button">清空</button>
        </div>
        <input id="secret" autocomplete="off" spellcheck="false" placeholder="在此处输入密钥" />
        <div class="error" id="error"></div>
      </div>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="feature-title">本地计算</div>
        <div class="feature-desc">密钥不上传</div>
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="feature-title">即时刷新</div>
        <div class="feature-desc">每 30 秒</div>
      </div>
      <div class="feature">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </div>
        <div class="feature-title">点击复制</div>
        <div class="feature-desc">一键到剪贴板</div>
      </div>
    </div>
  </main>

  <footer class="footer">
    SHA-1 <span class="dot"></span> 6 digits <span class="dot"></span> 30s
  </footer>

  <script>
    const secretInput = document.getElementById("secret");
    const codeEl = document.getElementById("code");
    const errorEl = document.getElementById("error");
    const countdownEl = document.getElementById("countdown");
    const ringProgress = document.getElementById("ringProgress");
    const codeStage = document.getElementById("codeStage");
    const copyRow = document.getElementById("copyRow");
    const copyRowText = document.getElementById("copyRowText");
    const clearBtn = document.getElementById("clearBtn");
    const clockTimeEl = document.getElementById("clockTime");

    const PERIOD = 30;
    const DIGITS = 6;
    const RING_CIRCUMFERENCE = 2 * Math.PI * 46;
    let lastCounter = null;

    function getSecretFromUrl() {
      const hashSecret = decodeURIComponent(location.hash.replace(/^#/, "").trim());
      return hashSecret || "";
    }

    function extractSecret(input) {
      let value = input.trim();
      if (value.toLowerCase().startsWith("otpauth://")) {
        try {
          const url = new URL(value);
          value = url.searchParams.get("secret") || "";
        } catch (_) {
          throw new Error("otpauth 链接格式不正确");
        }
      }
      return value.replace(/\s+/g, "").replace(/=+$/g, "").toUpperCase();
    }

    function base32Decode(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      if (!base32) throw new Error("请输入密钥以生成验证码");

      for (const char of base32) {
        const value = alphabet.indexOf(char);
        if (value === -1) {
          throw new Error("密钥仅支持 A-Z / 2-7 或 otpauth:// 链接");
        }
        bits += value.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      const high = Math.floor(counter / 0x100000000);
      const low = counter >>> 0;
      view.setUint32(0, high, false);
      view.setUint32(4, low, false);
      return buffer;
    }

    async function generateTOTP(secret, digits = DIGITS, period = PERIOD) {
      const keyBytes = base32Decode(secret);
      const counter = Math.floor(Date.now() / 1000 / period);

      const cryptoKey = await crypto.subtle.importKey(
        "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
      );

      const hmac = new Uint8Array(
        await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter))
      );

      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** digits).padStart(digits, "0");
    }

    function formatCode(code) {
      return code.slice(0, 3) + " " + code.slice(3);
    }

    function updateRing(remaining) {
      const ratio = remaining / PERIOD;
      ringProgress.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - ratio);

      ringProgress.classList.remove("warn", "crit");
      countdownEl.classList.remove("warn", "crit");
      if (remaining <= 5) {
        ringProgress.classList.add("crit");
        countdownEl.classList.add("crit");
      } else if (remaining <= 10) {
        ringProgress.classList.add("warn");
        countdownEl.classList.add("warn");
      }
    }

    function updateClock() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      clockTimeEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    async function updateCode(force = false) {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);

      countdownEl.textContent = String(remaining).padStart(2, "0") + " s";
      updateRing(remaining);
      updateClock();

      if (!force && counter === lastCounter) return;
      lastCounter = counter;

      const rawSecret = secretInput.value;
      if (!rawSecret.trim()) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        errorEl.textContent = "";
        return;
      }

      try {
        if (!window.crypto || !crypto.subtle) {
          throw new Error("当前浏览器不支持 Web Crypto，请使用 HTTPS 或现代浏览器");
        }

        const secret = extractSecret(rawSecret);
        const code = await generateTOTP(secret);
        codeEl.textContent = formatCode(code);
        codeEl.classList.remove("placeholder");
        codeEl.classList.remove("flash");
        void codeEl.offsetWidth;
        codeEl.classList.add("flash");
        errorEl.textContent = "";
        errorEl.classList.remove("success");
      } catch (error) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        errorEl.textContent = error.message || "生成失败";
        errorEl.classList.remove("success");
      }
    }

    secretInput.addEventListener("input", () => {
      lastCounter = null;
      updateCode(true);
    });

    async function copyCode(event) {
      const raw = codeEl.textContent.replace(/\s/g, "");
      if (!/^\d{6}$/.test(raw)) {
        errorEl.textContent = "请先输入有效密钥";
        errorEl.classList.remove("success");
        return;
      }

      if (event && event.clientX !== undefined) {
        const rect = codeStage.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = (event.clientX - rect.left) + "px";
        ripple.style.top = (event.clientY - rect.top) + "px";
        ripple.style.width = ripple.style.height = "20px";
        codeStage.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      }

      try {
        await navigator.clipboard.writeText(raw);
        copyRow.classList.add("success");
        copyRowText.textContent = "已复制 " + formatCode(raw);
        errorEl.textContent = "";
        errorEl.classList.remove("success");
        setTimeout(() => {
          copyRow.classList.remove("success");
          copyRowText.textContent = "点击数字复制";
        }, 1800);
      } catch (_) {
        errorEl.textContent = "复制失败，请手动选择验证码";
        errorEl.classList.remove("success");
      }
    }

    codeStage.addEventListener("click", copyCode);
    codeStage.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        copyCode();
      }
    });

    clearBtn.addEventListener("click", () => {
      secretInput.value = "";
      codeEl.textContent = "— — —";
      codeEl.classList.add("placeholder");
      errorEl.textContent = "";
      errorEl.classList.remove("success");
      lastCounter = null;
      secretInput.focus();
    });

    const urlSecret = getSecretFromUrl();
    if (urlSecret) secretInput.value = urlSecret;

    updateClock();
    setInterval(() => updateCode(false), 250);
    updateCode(true);
  </script>
</body>
</html>
