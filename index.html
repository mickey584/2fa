<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>两步验证</title>
  <style>
    :root {
      --bg: #faf8f3;
      --bg-soft: #f3f0e8;
      --paper: #ffffff;
      --ink: #1d1d1f;
      --ink-soft: #424245;
      --ink-dim: #6e6e73;
      --ink-mute: #a1a1a6;
      --line: #e6e2d6;
      --line-soft: #ede9dd;
      --green: #1f5f48;
      --green-deep: #163f30;
      --green-soft: #e7efea;
      --warn: #c9871f;
      --crit: #b03a3a;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    /* 苹果中国官网字体栈：英文 SF Pro，中文苹方 */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro SC",
        "PingFang SC", "Helvetica Neue", "Microsoft YaHei", "微软雅黑", sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 顶部窄条 */
    .topbar {
      background: var(--green);
      color: rgba(255, 255, 255, 0.95);
      font-size: 14px;
      padding: 12px 24px;
      text-align: center;
      letter-spacing: 0.2px;
      font-weight: 400;
    }

    .topbar strong {
      font-weight: 600;
      color: #fff;
    }

    /* 导航 */
    .nav {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 20px;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2a8b66 0%, #1f5f48 60%, #163f30 100%);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.5px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.18) inset,
        0 8px 18px -4px rgba(31, 95, 72, 0.45);
    }

    .nav-cta {
      padding: 11px 20px;
      background: var(--green);
      color: #fff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.2px;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
      font-family: inherit;
    }

    .nav-cta:hover { background: var(--green-deep); }

    /* 主内容 */
    .main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 56px 32px 88px;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 64px;
      align-items: center;
    }

    .left {
      animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 8px 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 32px;
      letter-spacing: 0.2px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(31, 95, 72, 0.15);
    }

    .badge strong {
      font-weight: 600;
      font-size: 13.5px;
      color: var(--ink);
      letter-spacing: 0.3px;
    }

    /* 苹果官网风格大标题 */
    h1 {
      margin: 0 0 28px;
      font-weight: 700;
      font-size: 80px;
      line-height: 1;
      letter-spacing: -3px;
      color: var(--ink);
    }

    h1 .accent {
      color: var(--green);
    }

    .lead {
      margin: 0 0 40px;
      font-size: 21px;
      line-height: 1.5;
      color: var(--ink-soft);
      max-width: 520px;
      font-weight: 400;
      letter-spacing: -0.2px;
    }

    .lead .quote {
      display: block;
      margin-top: 10px;
      color: var(--green-deep);
      font-weight: 500;
    }

    /* 输入区 */
    .field-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
      letter-spacing: 0.3px;
      color: var(--ink-dim);
      font-weight: 600;
    }

    .field-clear {
      background: none;
      border: none;
      color: var(--ink-mute);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      font-weight: 500;
      transition: color 0.15s ease;
      font-family: inherit;
    }

    .field-clear:hover { color: var(--green); }

    input {
      width: 100%;
      padding: 18px 20px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 16px;
      letter-spacing: 0.5px;
      color: var(--ink);
      outline: none;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: var(--ink-mute);
      letter-spacing: 0.5px;
      font-weight: 400;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(31, 95, 72, 0.12);
    }

    .error {
      margin-top: 14px;
      min-height: 20px;
      font-size: 14px;
      letter-spacing: 0.1px;
      color: var(--crit);
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .error.success { color: var(--green); }

    /* 右侧验证码舞台 */
    .right {
      position: relative;
      height: 580px;
      display: grid;
      place-items: center;
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    /* 装饰同心圆 */
    .decor-rings {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 0;
    }

    .decor-rings span {
      position: absolute;
      border: 1px solid var(--line-soft);
      border-radius: 50%;
    }

    .decor-rings span:nth-child(1) { width: 560px; height: 560px; opacity: 0.55; }
    .decor-rings span:nth-child(2) { width: 460px; height: 460px; opacity: 0.7; }
    .decor-rings span:nth-child(3) { width: 360px; height: 360px; opacity: 0.85; }

    /* 验证码卡片 */
    .code-card {
      position: relative;
      z-index: 2;
      width: 380px;
      padding: 44px 36px 32px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 30px 60px -25px rgba(31, 95, 72, 0.22),
        0 8px 20px -8px rgba(60, 50, 30, 0.08);
    }

    .code-card-label {
      font-size: 13px;
      letter-spacing: 1.5px;
      color: var(--ink-dim);
      text-transform: uppercase;
      font-weight: 600;
      text-align: center;
      margin-bottom: 28px;
    }

    /* 验证码 + 进度环 */
    .code-stage {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.15s ease;
      border-radius: 50%;
    }

    .code-stage:active { transform: scale(0.985); }

    .ring {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      pointer-events: none;
    }

    .ring circle {
      fill: none;
      stroke-width: 4;
    }

    .ring-track  { stroke: var(--line); }
    .ring-progress {
      stroke: var(--green);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.95s linear, stroke 0.3s ease;
    }

    .ring-progress.warn { stroke: var(--warn); }
    .ring-progress.crit { stroke: var(--crit); }

    /* 数字区域 */
    .code-inner {
      width: 190px;
      text-align: center;
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-weight: 700;
      font-size: 46px;
      letter-spacing: -1px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: opacity 0.25s ease;
    }

    .code.placeholder {
      color: var(--ink-mute);
      font-weight: 600;
      letter-spacing: 4px;
    }

    .code.flash {
      animation: codeFlash 0.5s ease;
    }

    @keyframes codeFlash {
      0%   { opacity: 0; transform: translateY(4px); filter: blur(3px); }
      100% { opacity: 1; transform: translateY(0);   filter: blur(0); }
    }

    /* 倒计时加粗显眼 */
    .countdown {
      margin-top: 16px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 17px;
      letter-spacing: 0.5px;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .countdown.warn { color: var(--warn); }
    .countdown.crit { color: var(--crit); }

    /* 复制提示 */
    .copy-row {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px dashed var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13.5px;
      letter-spacing: 0.2px;
      color: var(--ink-dim);
      font-weight: 500;
      transition: color 0.25s ease;
    }

    .copy-row.success { color: var(--green); font-weight: 600; }
    .copy-row svg { width: 14px; height: 14px; stroke-width: 2; }

    /* 复制波纹 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--green);
      opacity: 0.18;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: ripple 0.7s ease-out forwards;
    }

    @keyframes ripple {
      to { transform: translate(-50%, -50%) scale(8); opacity: 0; }
    }

    /* 平板 */
    @media (max-width: 920px) {
      .main {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 32px 24px 48px;
      }
      .right { height: auto; }
      h1 { font-size: 60px; letter-spacing: -2px; margin-bottom: 20px; }
      .lead { font-size: 19px; margin-bottom: 28px; }
    }

    /* 手机 —— 紧凑布局，一屏可见 */
    @media (max-width: 480px) {
      .topbar { font-size: 13px; padding: 9px 16px; }
      .nav { padding: 14px 20px; }
      .nav-cta { padding: 9px 16px; font-size: 13.5px; }
      .logo { font-size: 18px; }
      .logo-mark { width: 32px; height: 32px; font-size: 13.5px; }

      .main {
        gap: 14px;
        padding: 18px 22px 32px;
      }
      .right { height: auto; }

      .badge {
        font-size: 12.5px;
        padding: 6px 14px 6px 12px;
        margin-bottom: 16px;
      }
      .badge strong { font-size: 12px; }

      h1 {
        font-size: 38px;
        letter-spacing: -1.2px;
        margin-bottom: 14px;
      }

      .lead {
        font-size: 15px;
        line-height: 1.55;
        margin-bottom: 22px;
      }
      .lead .quote { margin-top: 6px; }

      input { padding: 14px 16px; font-size: 15px; }

      .error { margin-top: 10px; min-height: 16px; font-size: 13px; }

      /* 装饰环缩小一圈 */
      .decor-rings span:nth-child(1) { width: 360px; height: 360px; }
      .decor-rings span:nth-child(2) { width: 290px; height: 290px; }
      .decor-rings span:nth-child(3) { width: 230px; height: 230px; }

      .code-card {
        width: 100%;
        max-width: 320px;
        padding: 24px 24px 18px;
        border-radius: 22px;
      }
      .code-card-label {
        font-size: 12px;
        letter-spacing: 1.2px;
        margin-bottom: 14px;
      }
      .code-stage { width: 200px; height: 200px; }
      .code-inner { width: 150px; }
      .code { font-size: 32px; letter-spacing: -0.5px; }
      .countdown { font-size: 14px; margin-top: 10px; }
      .copy-row {
        margin-top: 16px;
        padding-top: 14px;
        font-size: 12.5px;
      }
      .copy-row svg { width: 12px; height: 12px; }
      .ring circle { stroke-width: 3.5; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>LBYZ</strong> · 纯本地计算 · 无隐私泄露
  </div>

  <nav class="nav">
    <div class="logo">
      <div class="logo-mark">2F</div>
      <span>Auth</span>
    </div>
    <button class="nav-cta" type="button" onclick="document.getElementById('secret').focus()">
      输入密钥 →
    </button>
  </nav>

  <main class="main">
    <section class="left">
      <div class="badge">
        <span class="badge-dot"></span>
        <span>当前规格</span>
        <strong>SHA-1 · 6位 · 30s</strong>
      </div>

      <h1>
        验证码，<br />
        <span class="accent">即时优雅。</span>
      </h1>

      <p class="lead">
        粘贴密钥，验证码自动生成。环形读秒陪伴每一次刷新，点击即复制。
        <span class="quote">简洁如纸，准时如刻。</span>
      </p>

      <div class="field-label">
        <span>Secret Key</span>
        <button class="field-clear" id="clearBtn" type="button">清空</button>
      </div>
      <input id="secret" autocomplete="off" spellcheck="false" placeholder="在此处输入密钥" />

      <div class="error" id="error"></div>
    </section>

    <section class="right">
      <div class="decor-rings" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>

      <div class="code-card">
        <div class="code-card-label">One-Time Code</div>

        <div class="code-stage" id="codeStage" role="button" tabindex="0" aria-label="点击复制验证码">
          <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ring-track" cx="50" cy="50" r="46" />
            <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46"
                    stroke-dasharray="289.03" stroke-dashoffset="0" />
          </svg>
          <div class="code-inner">
            <div class="code placeholder" id="code">— — —</div>
            <div class="countdown" id="countdown">— — s</div>
          </div>
        </div>

        <div class="copy-row" id="copyRow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyRowText">点击数字复制</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const secretInput = document.getElementById("secret");
    const codeEl = document.getElementById("code");
    const errorEl = document.getElementById("error");
    const countdownEl = document.getElementById("countdown");
    const ringProgress = document.getElementById("ringProgress");
    const codeStage = document.getElementById("codeStage");
    const copyRow = document.getElementById("copyRow");
    const copyRowText = document.getElementById("copyRowText");
    const clearBtn = document.getElementById("clearBtn");

    const PERIOD = 30;
    const DIGITS = 6;
    const RING_CIRCUMFERENCE = 2 * Math.PI * 46;
    let lastCounter = null;

    /**
     * 仅从 URL hash (#xxx) 读取密钥。
     * 不读 location.pathname，避免本地预览或部署在子目录时
     * 把网址里的路径片段误识别为密钥。
     */
    function getSecretFromUrl() {
      const hashSecret = decodeURIComponent(location.hash.replace(/^#/, "").trim());
      return hashSecret || "";
    }

    function extractSecret(input) {
      let value = input.trim();
      if (value.toLowerCase().startsWith("otpauth://")) {
        try {
          const url = new URL(value);
          value = url.searchParams.get("secret") || "";
        } catch (_) {
          throw new Error("otpauth 链接格式不正确");
        }
      }
      return value.replace(/\s+/g, "").replace(/=+$/g, "").toUpperCase();
    }

    function base32Decode(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      if (!base32) throw new Error("请输入密钥以生成验证码");

      for (const char of base32) {
        const value = alphabet.indexOf(char);
        if (value === -1) {
          throw new Error("密钥仅支持 A-Z / 2-7 或 otpauth:// 链接");
        }
        bits += value.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      const high = Math.floor(counter / 0x100000000);
      const low = counter >>> 0;
      view.setUint32(0, high, false);
      view.setUint32(4, low, false);
      return buffer;
    }

    async function generateTOTP(secret, digits = DIGITS, period = PERIOD) {
      const keyBytes = base32Decode(secret);
      const counter = Math.floor(Date.now() / 1000 / period);

      const cryptoKey = await crypto.subtle.importKey(
        "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
      );

      const hmac = new Uint8Array(
        await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter))
      );

      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** digits).padStart(digits, "0");
    }

    function formatCode(code) {
      return code.slice(0, 3) + " " + code.slice(3);
    }

    function updateRing(remaining) {
      const ratio = remaining / PERIOD;
      ringProgress.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - ratio);

      ringProgress.classList.remove("warn", "crit");
      countdownEl.classList.remove("warn", "crit");
      if (remaining <= 5) {
        ringProgress.classList.add("crit");
        countdownEl.classList.add("crit");
      } else if (remaining <= 10) {
        ringProgress.classList.add("warn");
        countdownEl.classList.add("warn");
      }
    }

    async function updateCode(force = false) {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);

      countdownEl.textContent = String(remaining).padStart(2, "0") + " s";
      updateRing(remaining);

      if (!force && counter === lastCounter) return;
      lastCounter = counter;

      const rawSecret = secretInput.value;
      if (!rawSecret.trim()) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        errorEl.textContent = "";
        return;
      }

      try {
        if (!window.crypto || !crypto.subtle) {
          throw new Error("当前浏览器不支持 Web Crypto，请使用 HTTPS 或现代浏览器");
        }

        const secret = extractSecret(rawSecret);
        const code = await generateTOTP(secret);
        codeEl.textContent = formatCode(code);
        codeEl.classList.remove("placeholder");
        codeEl.classList.remove("flash");
        void codeEl.offsetWidth;
        codeEl.classList.add("flash");
        errorEl.textContent = "";
        errorEl.classList.remove("success");
      } catch (error) {
        codeEl.textContent = "— — —";
        codeEl.classList.add("placeholder");
        errorEl.textContent = error.message || "生成失败";
        errorEl.classList.remove("success");
      }
    }

    secretInput.addEventListener("input", () => {
      lastCounter = null;
      updateCode(true);
    });

    async function copyCode(event) {
      const raw = codeEl.textContent.replace(/\s/g, "");
      if (!/^\d{6}$/.test(raw)) {
        errorEl.textContent = "请先输入有效密钥";
        errorEl.classList.remove("success");
        return;
      }

      if (event && event.clientX !== undefined) {
        const rect = codeStage.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = (event.clientX - rect.left) + "px";
        ripple.style.top = (event.clientY - rect.top) + "px";
        ripple.style.width = ripple.style.height = "20px";
        codeStage.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      }

      try {
        await navigator.clipboard.writeText(raw);
        copyRow.classList.add("success");
        copyRowText.textContent = "已复制 " + formatCode(raw);
        errorEl.textContent = "";
        errorEl.classList.remove("success");
        setTimeout(() => {
          copyRow.classList.remove("success");
          copyRowText.textContent = "点击数字复制";
        }, 1800);
      } catch (_) {
        errorEl.textContent = "复制失败，请手动选择验证码";
        errorEl.classList.remove("success");
      }
    }

    codeStage.addEventListener("click", copyCode);
    codeStage.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        copyCode();
      }
    });

    clearBtn.addEventListener("click", () => {
      secretInput.value = "";
      codeEl.textContent = "— — —";
      codeEl.classList.add("placeholder");
      errorEl.textContent = "";
      errorEl.classList.remove("success");
      lastCounter = null;
      secretInput.focus();
    });

    const urlSecret = getSecretFromUrl();
    if (urlSecret) secretInput.value = urlSecret;

    setInterval(() => updateCode(false), 250);
    updateCode(true);
  </script>
</body>
</html>
