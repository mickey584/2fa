<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOTP 验证码生成器</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.08s, opacity 0.2s;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary {
      flex: 1;
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .code-box {
      margin-top: 26px;
      padding: 24px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      text-align: center;
    }

    .code {
      font-size: 46px;
      font-weight: 800;
      letter-spacing: 8px;
      font-variant-numeric: tabular-nums;
      user-select: all;
    }

    .timer-wrap {
      margin-top: 18px;
    }

    .timer-text {
      margin-bottom: 8px;
      color: #6b7280;
      font-size: 14px;
    }

    .progress {
      height: 9px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.2s linear;
    }

    .error {
      margin-top: 14px;
      color: #dc2626;
      font-size: 14px;
      min-height: 20px;
    }

    .tip {
      margin-top: 18px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>TOTP 验证码生成器</h1>
    <p class="subtitle">在浏览器本地计算，不会把密钥上传到服务器。</p>

    <label for="secret">Google Authenticator 密钥</label>
    <input id="secret" autocomplete="off" spellcheck="false" placeholder="例如：JBSWY3DPEHPK3PXP" />

    <div class="row">
      <button class="primary" id="generateBtn">生成验证码</button>
      <button class="secondary" id="copyBtn">复制</button>
      <button class="secondary" id="clearBtn">清空</button>
    </div>

    <div class="error" id="error"></div>

    <section class="code-box">
      <div class="code" id="code">------</div>
      <div class="timer-wrap">
        <div class="timer-text" id="timerText">剩余时间：-- 秒</div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </section>

    <p class="tip">
      支持自动去除空格、小写转大写、去除 otpauth:// 链接中的 secret。验证码默认 6 位，每 30 秒刷新一次。
    </p>
  </main>

  <script>
    const secretInput = document.getElementById("secret");
    const codeEl = document.getElementById("code");
    const errorEl = document.getElementById("error");
    const timerText = document.getElementById("timerText");
    const progressBar = document.getElementById("progressBar");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");

    const PERIOD = 30;
    const DIGITS = 6;
    let lastCounter = null;

    function extractSecret(input) {
      let value = input.trim();

      // 支持直接粘贴 otpauth://totp/...?...secret=XXXX
      if (value.toLowerCase().startsWith("otpauth://")) {
        try {
          const url = new URL(value);
          value = url.searchParams.get("secret") || "";
        } catch (_) {
          throw new Error("otpauth 链接格式不正确");
        }
      }

      return value
        .replace(/\s+/g, "")
        .replace(/=+$/g, "")
        .toUpperCase();
    }

    function base32Decode(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      if (!base32) {
        throw new Error("请输入密钥");
      }

      for (const char of base32) {
        const value = alphabet.indexOf(char);
        if (value === -1) {
          throw new Error("密钥只能包含 A-Z 和 2-7，或粘贴 otpauth:// 链接");
        }
        bits += value.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }

      return new Uint8Array(bytes);
    }

    function counterToBytes(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      const high = Math.floor(counter / 0x100000000);
      const low = counter >>> 0;
      view.setUint32(0, high, false);
      view.setUint32(4, low, false);
      return buffer;
    }

    async function generateTOTP(secret, digits = DIGITS, period = PERIOD, counterOffset = 0) {
      const keyBytes = base32Decode(secret);
      const counter = Math.floor(Date.now() / 1000 / period) + counterOffset;

      const cryptoKey = await crypto.subtle.importKey(
        "raw",
        keyBytes,
        { name: "HMAC", hash: "SHA-1" },
        false,
        ["sign"]
      );

      const hmac = new Uint8Array(
        await crypto.subtle.sign("HMAC", cryptoKey, counterToBytes(counter))
      );

      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** digits).padStart(digits, "0");
    }

    async function updateCode(force = false) {
      const now = Math.floor(Date.now() / 1000);
      const counter = Math.floor(now / PERIOD);
      const remaining = PERIOD - (now % PERIOD);

      timerText.textContent = `剩余时间：${remaining} 秒`;
      progressBar.style.width = `${(remaining / PERIOD) * 100}%`;

      if (!force && counter === lastCounter) return;
      lastCounter = counter;

      const rawSecret = secretInput.value;
      if (!rawSecret.trim()) {
        codeEl.textContent = "------";
        errorEl.textContent = "";
        return;
      }

      try {
        if (!window.crypto || !crypto.subtle) {
          throw new Error("当前浏览器不支持 Web Crypto，请使用 HTTPS 或现代浏览器");
        }

        const secret = extractSecret(rawSecret);
        const code = await generateTOTP(secret);
        codeEl.textContent = code;
        errorEl.textContent = "";
      } catch (error) {
        codeEl.textContent = "------";
        errorEl.textContent = error.message || "生成失败";
      }
    }

    generateBtn.addEventListener("click", () => updateCode(true));

    secretInput.addEventListener("input", () => {
      lastCounter = null;
      updateCode(true);
    });

    copyBtn.addEventListener("click", async () => {
      const code = codeEl.textContent.trim();
      if (!/^\d{6}$/.test(code)) {
        errorEl.textContent = "没有可复制的验证码";
        return;
      }

      try {
        await navigator.clipboard.writeText(code);
        errorEl.textContent = "已复制验证码";
        setTimeout(() => {
          if (errorEl.textContent === "已复制验证码") errorEl.textContent = "";
        }, 1200);
      } catch (_) {
        errorEl.textContent = "复制失败，请手动选择验证码复制";
      }
    });

    clearBtn.addEventListener("click", () => {
      secretInput.value = "";
      codeEl.textContent = "------";
      errorEl.textContent = "";
      lastCounter = null;
      secretInput.focus();
    });

    setInterval(() => updateCode(false), 300);
    updateCode(true);
  </script>
</body>
</html>
